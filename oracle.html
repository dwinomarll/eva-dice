g to success in various aspects of life.\n\n### Straight Interpretation:\n- Love: Hard work in your romantic life will yield fruitful results, potentially leading to a partnership with a creative and passionate individual.\n- Career: A promotion or significant improvement in your career is likely, with long-term success stemming from your dedication.\n- Money: Expect new income as your financial management skills enhance your stability, while maintaining a balance between saving and spending.\n\n### Reversed Interpretation:\n- Lack of support may stem from arrogance or selfishness, affecting your relationships and stability.\n- Love: Your slow love life may result from behaviors that distance others; allow your partner space to express themselves.\n- Career: Projects may progress slowly due to a struggle with leadership; trust your intuition over others' opinions.\n- Money: Financial gains may not meet expectations; take control and act thoughtfully regarding your finances.", "arcana": "Mayor Arcana"}, {"name": "FOUR OF WANDS", "sage": "The Four of Wands signifies a time of celebration and joy, indicating achievements worth acknowledging with family and friends. In a straightforward reading, it points to fulfilling events like weddings or promotions. For love, it suggests strong community support, with potential romantic developments. Career-wise, it reflects recognition and positive connections. However, if reversed, it highlights imbalances in relationships, indicating a lack of support, disagreements, and communication issues. In love, tensions may arise, while in career contexts, expect challenges in workplace dynamics. Strive for calm and open communication to navigate these challenges effectively.", "arcana": "Minor Arcana"}, {"name": "Queen of Swords", "sage": "The \"Queen of Swords\" represents a strong, introspective figure who values truth and clarity. In a reading, she advises making decisions based on judgment rather than emotions, particularly in love, career, and financial matters. When upright, she signifies wisdom, respect, and effective communication, while reversed, she warns against emotional decision-making and potential bitterness. This card emphasizes the importance of balance between feelings and logic to navigate life's challenges effectively.", "arcana": "Mayor Arcana"}];

const WILD_MYSTICS = [{"id": "2c86ae29-a07c-8001-be94-c3d101c6867c", "name": "HERON", "oracle": "", "mystical": "", "content": "STILLNESS This card represents stillness and serenity. Unlike Bear, who inspires physical rest, the heron card signals psychological and spiritual rest. The heron is a fishing bird who relies on stillness to catch prey. As they wait patiently in a calm pond, the water becomes glassy and still. Their balance upon their stalk-like legs inspires harmony, centering, and tranquillity. This card urges you to stop and take a moment to center yourself. It is a card for meditation, mindfulness, reflection, and grounding. In Korea, the heron is a symbol of grace and transcendence above the mundane world. A heron on the ground is associated with earth and waters around them. But as they take flight into the boundless air, they transcend the physical. If you have been too grounded in the material, or focused on the physical, then this card urges you to look higher. If the bodily reality of a situation is too definite and painful right now, focusing on mental journeys might be safe and healing. Out-of-body experiences, visualization, and higher consciousness may be calling to you as ways to get through the present situation. This card may also represent those born under the Western Zodiac sign of Aquarius. ♒️ \nSHADOW READING: As the heron strikes and plucks a fish from the water, the splashes of chaos take over and ripple out. Stillness may be the calm before the storm. Alternatively, the ripples of someone else's chaos may be threatening to surge into your world. \nCORRESPONDENCES: Zodiac sign of Aquarius. ♒️ ELEMENT: Air/Water FLORA: Cypress, reed, lily of the valley, magnolia STONES: Moss agate, blue calcite, chrysocolla, jade SPELLWORK: Promoting inner calm and peace, quelling fear and doubt"}, {"id": "2c86ae29-a07c-8004-8c6b-dccb6bd43a8b", "name": "BEAR", "oracle": "", "mystical": "", "content": "REST This card represents the winter months and essential rest. In nature, hibernation is a part of survival for many creatures. The body is calmed for slumber through the cold months. Metabolism is slowed. Physical activity is reduced. It is the tranquil time of silence before the song of spring. In today's busy world, it is important to take time to rest, recuperate, and reinvigorate yourself. Unlike Heron , who inspires psychological rest, bear urges physical rest. This card tells you to reserve your energy and take a moment to look inward. On the bear's forehead is the symbol for the wheel of the year. Rest is a crucial part of the yearly cycle. Humanity's need for rest has caused us to create holidays, vacations, and seasonal celebrations. This card is a reminder that we all have our own cycles of being, to which we should listen. Whether you are a night owl or an early bird; if the darkening seasons affect your mental health; or if you menstruate; cycles can affect your mood and way of life. This card is a reminder to listen to your needs and rest when required. SHADOW READING There are many forms of hibernation, generally caused by weather, lack of food, or seasonal cues. Bears enter a form of torpor. While their bodies use minimal energy, they are still able to wake if necessary. The bear can be a symbol of readiness, able to rise from slumber and spring into action. Many cultures also see the bear as a representation of power. Warriors such as Scandinavian Berserkers donned bearskins to frighten their enemies or harness the bears' power. The bear at rest is a coiled spring, ready to act if disturbed. This card may symbolize a well of untapped power, a simmering temper, or burgeoning potential. CORRESPONDENCES ELEMENT: Earth  🌎 FLORA: Lavender, chamomile, passionflower, valerian STONES: Rose quartz, hematite, malachite, amethyst, howlite, smoky quartz SPELLWORK: Sleep/dream work, calling on reserves of energyl strength, self-care, winter rites, Yule ritual"}, {"id": "2c86ae29-a07c-800b-981a-ff9a96f8156b", "name": "MONKEY", "oracle": "", "mystical": "", "content": "PLAY This card represents playfulness and embracing one's childlike in-stincts. In the folklore of the Philippines, monkeys are associated with children who turned into small primates through laughter. In popular culture, monkeys are often associated with mischief, laughter, and fun. This card promotes a childlike view of the world, a playful heart, and not reading too heavily into hidden meanings. This card may be seen as a call to heal the effects of childhood trauma or familial emotional abuse. It asks you to care for your inner child and allow them to play. Do not take matters so seriously, and allow yourself to let go once in a while. Embrace the present rather than always thinking of the future. One of the most popular depictions of the monkey in Chinese literature is that of the Monkey King, Sun Wukong, from the I 6th-century novel Journey to the West. Beginning life as a playful wild monkey, Sun Wukong becomes a traveler, warrior, hero, and great magical being. The card might indicate an adventure or journey, with the fun of allowing new and exciting ventures into your life and discovering how they will allow you to grow and change. SHADOW READING The Buddhist term \"monkey-mind\" denotes a mind that is whimsical, uncontrollable, and unsettled. The shadow reading of the play card might be telling you to put childish ways aside and confront feelings of immaturity, selfishness, and impulsiveness. CORRESPONDENCES ELEMENT: Earth FLORA: Caraway, hyacinth, monkey flower, daisies STONES: Pink chalcedony, smithsonite, chrysoprase, dioptase SPELLWORK: Healing of the inner child, fairy magick, dance magick, bringing lightheartedness to a tense situation, celebrating the birth of a child"}, {"id": "2c86ae29-a07c-800e-804f-e55fb0bf2b9d", "name": "DRAGONFLY", "oracle": "", "mystical": "", "content": "\nJOY: This card urges you to see the joy in the world and seek your happiness. You may wish to work with this card to manifest a positive life change or help you see the light in dark times. The dragonfly is a unique insect who combines the realms of earth (from the mud in which they are born), water (in which they spend their adolescence), and air (through which they fly as an adult), prompting you to grasp the wonders of life from every angle. After spending much of their lives under the water in nymph form, emerging dragonflies take flight into their relatively short adult lives. This card serves as a message to find pleasure in everyday life and live for the moment. In Japan, dragonflies are considering bringers of luck and fortune as well as symbols of victory and happiness. This card encourages you to give joy, and be open to receiving joy and happiness into your life. \nSHADOW READING: If we are closed off to joy, we become incapable of giving it to others or receiving it ourselves. An obvious shadow reading of this card would be sadness, depression, or anxiety. But another reading would be those who try too hard to make others joyful at the expense of their own happiness. Do not be afraid to take some time for yourself, and do not close yourself off to happiness. There is plenty for everyone. \nCORRESPONDENCES: ELEMENT: Air/Water/Earth FLORA: Chrysanthemum, marigold, calamint, celandine, oregano STONES: Carnelian, chalcedony, dioptase, ruby, sunstone SPELLWORK: To promote happiness, celebration of life, luck and prosperity magick, attracting joyous events"}, {"id": "2c86ae29-a07c-8010-a139-d492eb95cc95", "name": "KOALA", "oracle": "", "mystical": "", "content": "\nPROTECT: This card represents protection from harm and comfort in difficult times. Unlike the scorpion card , this card encourages a caring and reassuring form of protection, often associated with caregivers. This card is the protection of a safe place a thick blanket rather than a suit of armor. Despite its bear-like appearance, the koala is a marsupial. As with most marsupials, koalas care for their young using an abdominal pouch, keeping them safe, close, warm, and nourished. Koalas tend to avoid energy-heavy hostile behavior unless it is necessary, but can be aggressive and territorial when forced. The koala card represents comforting protection. Sadly, many myths and legends of Australian Aboriginal peoples have been lost due to their recent tragic history. One surviving story from the Gumbaynggirr people of New South Wales is that of the great flood, in which a little boy uses koala intestines to create a bridge between the islands that emerged from receding flood waters. After the bridge was built, the people of Africa joined those of Australia and the different Aboriginal tribes were born. Much like modern conservation efforts to keep the koala from extinction, this card promotes conservation of nature, protection of culture, and caring for others. \nSHADOW READING: The koala gets very little energy from their diet, so the creatures conserve their energy through slow movement and regular rest. Consequently, the koala is often associated with laziness or lethargy. A shadow reading of this card may indicate protection without teeth. It is an offer of safety and comfort without substantiating the offer with action, care, effort, and defense. \nCORRESPONDENCES: ELEMENT: Earth. 🌎 FLORA: Eucalyptus, angelica, calendula, motherwort STONES: Cat's eye, carnelian, chlorite, fluorite, lapis lazuli, peridot SPELLWORK: Protection of a loved one, the blessing of a new child, dispelling nightmares"}, {"id": "2c86ae29-a07c-8013-a5fd-c2708b793aa9", "name": "OCTOPUS ", "oracle": "", "mystical": "", "content": "ADAPTATION This card represents adapting to new situations, flexibility, and adjust ment. Octopuses are fascinating intelligent creatures with the ability to adapt their bodies in many ways, from camouflaging themselves by changing the color of their skin, to mimicking the movement of other marine life, to squeezing in and out of incredibly tight spots. They are even capable of leaving the water for a time to avoid predators. Much like the salamander , octopuses are regenerative creatures capable of re-growing limbs, and can disguise themselves with shells and sea debris to avoid detection. This card symbolizes adapting to your surroundings with ease and agility. It is the ability to think on your feet and outside the box. The octopus card may urge you to read a situation from a new angle or take a new approach to your problem. The octopus is a creative problem solver and this card encourages you to be the same. Take a step back and do not get tangled up in a crisis. Regroup and begin the resolution afresh. SHADOW READING In mythology, the octopus was often associated with the sea monster Kraken, a giant many-legged beast that was a favorite subject of sailors' tales. Folklore and art depict giant octopuses who tangle themselves up within the rigging of ships and drag seafarers down into the ocean. When we consider these symbols alongside a shadow reading of the octopus as a representation of adaptability, it may be seen as a warning to get out while you can and not embroil yourself in something so much that you become entangled by it. Adapting, adjusting, and changing yourself can take great energy and sometimes the reward is not worth the price. CORRESPONDENCES ELEMENT: Water FLORA: Balsam, peppermint, campanula, camphor STONES: Cerussite, blue chalcedony, bloodstone, brown jade SPELLWORK: Moving to a new home or country, travel magick, aid in seeing an alternative path through a difficult situation"}, {"id": "2c86ae29-a07c-8019-831b-fc2e6587287e", "name": "STARFISH", "oracle": "", "mystical": "", "content": "\nSACRED: This card represents the sacred geometry and symmetry of nature. From the fractals of succulent plants to the Fibonacci seed spirals on the head of a sunflower, many natural forms correspond to mathematical and geometric formulas. Throughout history, philosophers and even scientists and mathematicians have ascribed the remarkable symmetry and geometry of the natural world to a higher power. This is reflected in the architectural symmetry of places of worship, ancient temples, and spiritual artwork. This card tells you to look for the sacred in the mundane and the supernatural in the natural. When this card comes into a reading it is a reminder that we are all unified, similar and akin to one another. It is a symbol of our connection to each other as well as to the divine. Whatever the divine might mean to you, this card signifies our links and bonds with one another through not only our similarities but also our differences. This card might be asking you to rise above a situation or seek enlightenment. \nSHADOW READING: The shadow reading of this card may warn us that we have become preoccupied with the things that separate us from other people. We have focused so much on our differences that we have forgotten our connections. Reconciliation with others or with the parts of yourself that have fractured might be necessary. ELEMENT: Water 🌊 FLORA: Walnut, chervil, frankincense, sunflower, lily, buttercup STONES: Amethyst, ametrine, celestite, brown jasper SPELLWORK: Communication with divine energy, meditating on the self, invocation work, angel magick"}, {"id": "2c86ae29-a07c-801f-a483-d378481cc3a9", "name": "BEE", "oracle": "", "mystical": "", "content": "\nWORK: This card represents hard work, focus, and industry. While the Ant card focuses on collaboration to achieve a goal, the bee card focuses on the goal itself. It represents effort toward a pleasant outcome or long-overdue reward. This card tells us that the goal we seek is within our reach if we persist. The bee, like the hummingbird, is often associated with the sun. However, the bee's solar energy is focused on production, invention, and the job at hand. The ancient Egyptians are considered the first people to create artificial hives for producing honey (though wild honey harvesting is also an ancient practice, and the development of domesticated hive-based farming is still being researched). They also believed that the sun god Ra created bees from his tears as they hit the sand. Honey has often been likened to gold, or imbued with the power of the sun due to its color and its seemingly miraculous production by these amazing insects. We may view the bee card as symbolizing the fruits of labor and a rich, successful outcome. This card indicates financial and business success. It is industry at its most rewarding, and the sun shining down on your back as you toil. SHADOW READING The shadow reading of the bee card is lethargy, ennui, and stupor. It is the sun overshadowed. It is the exhaustion felt when one has lost passion for a project or excitement for work. The shadow interpretation of the bee card may tell you it is time to mix things up, change your perspective, or perhaps give up on the project altogether if it no longer brings you fulfillment. CORRESPONDENCES ELEMENT: Air/Fire FLORA: Amaryllis, amber, cowslip, mace STONES: Citrine, fluorite, sodalite, amazonite SPELLWORK: New job, standing out from the crowd in a workplace, focus on the task at hand, money magick, Summer Solstice, summer rites"}, {"id": "2c86ae29-a07c-8024-a8f6-e26035550958", "name": "SCORPION", "oracle": "", "mystical": "", "content": "DEFEND This card represents defense and resistance. In ancient Egypt, the scorpion was seen as a guardian and protector of the souls of the dead as they made their way from this life. In ancient Greece, Skorpios was a giant scorpion who defended the animals of the world from destruction at the hands of the giant Orion. Despite their intimidating appearance and weapon-like stinger, the scorpion rarely attacks unless they are first threatened. Most scorpions, in fact, posture, produce sound, and even squirt \"warning shots\" of venom in order to ward off predators before taking the extreme step of stinging them. This card is one of fierce protection and guardianship, but also the ability to fight back if necessary. The scorpion card may be reminding you that sometimes words and postulations are not enough to be heard. This is a card of dynamic defense, of taking action and standing up in the face of adversity. While the Protect card  may urge you to shield, the defend card reminds you that you may also need to draw your sword. This card may also represent those born under the Western Zodiac sign of Scorpio. ♏️ \nSHADOW READING: Defense is a necessary tool for survival and can often be accompanied by resistance, confrontation, and struggle. However, sometimes defensive behavior can be misplaced and lead to stubbornness, pig-headedness, or fragility in the face of criticism. Be careful to question what you are so staunchly defending and deconstruct it. Listen to constructive criticism and come to a better understanding of your position. \nCORRESPONDENCES: Zodiac’s Sign: Scorpio ELEMENT: Fire FLORA: Amaranth, angelica, birch, chrysanthemum, gorse, sandalwood STONES: Pyrolusite, fire opal, sardonyx, fire agate SPELLWORK: Banishing magick, reversing hexes, revealing injustice or bad behavior, protective spellwork"}, {"id": "2c86ae29-a07c-8031-b8f3-c0998202919a", "name": "FROG", "oracle": "", "mystical": "", "content": "\nHEAL: This card represents healing and restoration. The frog, like many creatures (including cats, ravens, goats, and pigs), was often associated with witchcraft in early European superstition. Frogs were reportedly used as ingredients in spells for curing illness, ridding the skin of warts, and even curing a broken heart. This association with healing may have stemmed from lore that linked the frog with death and rebirth, due to their transformation from a tiny, water-based tadpole to their adult form. The frog card is one of physical and mental healing. Healing can seem like a long and arduous process, but this is a card of hope and recuperation.  In ancient Egypt, the frog was a symbol of childbirth, fertility, and procreation. The frog card might reference an upcoming birth, adoption, or addition to a family. If you do not plan on having children, then it might indicate the birth of an idea, life-changing project, or other creation of the mind or spirit. SHADOW READING The shadow reading of the frog card might be a portent of ill health, either mental or physical. However, it might also symbolize a blockage or delay in healing. This might relate to a difficult or extensive diagnosis, chronic illness, or ongoing mental health issues. The card is encouraging you not to feel disconnected from the power of healing, even when the road ahead seems difficult. CORRESPONDENCES ELEMENT: Water FLORA: Adder's tongue, aloe vera, anemone, feverfew STONES: Bloodstone, tourmaline, turquoise, clear quartz SPELLWORK: Healing magick, caring for a sick or recovering person, fertility magick, luck with a diagnosis or surgery"}, {"id": "2c86ae29-a07c-8034-af4c-eb3bf3b2b3bb", "name": "ANT", "oracle": "", "mystical": "", "content": "\nCOLLABORATE: This card invokes themes of teamwork and cooperation. Many creatures work in harmony with one another to achieve their goals, be it the gathering of food, protecting themselves, or creating a home. This card may be telling you to accept help from others or encouraging you to ask for help when it is needed. You do not have to follow your path alone. The ant is an exceptional worker who labors in collaboration with a great many others of their kind. Together, ants create intricate nests and solve problems with feats of insect engineering. They create bridges or ladders from their own entwined bodies to pass obstacles. This card encourages you to work alongside others to achieve your aims or overcome your obstacles. The alchemical symbol for tin is pictured above the ant's form. Tin has been used in many alloys, from bronze to pewter, and serves as a protective plating for steel against rust. Much like the ant, it is a strong collaborative force. This card reminds you that there is strength in numbers, and that in surrounding yourself with like-minded people, you may achieve great things. SHADOW READING From Aesop's Fable of \"The Ant and the Grasshopper\" to the Christian Bible, the ant is considered a forward planner who prepares for the future. The shadow reading of this card may therefore be a sign to prepare yourself for a change of circumstance. CORRESPONDENCES ELEMENT: Earth FLORA: Pecan, meadowsweet, passionflower STONES: Chalcedony, cinnabar, yellow fluorite, sodalite SPELLWORK: Encouraging harmony in the workplace/home/ relationships; blessings on a project or exam"}, {"id": "2c86ae29-a07c-803a-8688-ce789e85567b", "name": "HORSE", "oracle": "", "mystical": "", "content": "\nTRUST: This card represents trust and loyalty. Throughout history and within different cultures, horses have been associated with war, power, death, and luck. However, any who have chosen to work alongside them or ride with them will probably favor the theme of trust. A large and imposing creature, since its domestication the horse has been an essential part of human development for good or ill. Humans have entrusted horses with their lives and fortunes. Horses have loyally walked alongside humans in battle, storm, and over oceans. This card is symbolic of allegiance, solidarity, and camaraderie. It is a friendship forged from mutual respect and shared adversities. When a horse is trained to be ridden, they are said to be broken. Through this process, their natural animal urges to hide or flee are replaced with subservience to the human rider. One reading of this card could be warning you not to trust blindly, to follow your own will when you feel you are being led astray. It is urging you to trust in yourself. SHADOW READING In Scottish folklore, the kelpie is a shapeshifting creature who generally takes the form of a black horse. The creature entices wandering humans to ride it, then runs into the water, where the victims are drowned. Much as the light reading of this card warns against blind trust, the shadow reading warns against misplaced trust. CORRESPONDENCES ELEMENT: Earth FLORA: Freesia, sweet pea, thyme STONES: Sodalite, smithsonite, amber, chrysoprase SPELLWORK: Blessing a marriage or union, encouraging trust and understanding between people, guarding against fraud"}, {"id": "2c86ae29-a07c-803b-96a0-ebedb8c25d21", "name": "TIGER", "oracle": "", "mystical": "", "content": "STRENGTH The tiger has been hailed in many mythologies as a being of great might and physical ability. They have also been connected with war, athleticism, and protection. In Imperial China, the symbol of the tiger was often associated with high ranking generals, whose only superiors were the dragon and phoenix (emperor and empress). This card is a symbol of physical strength, protective strength, and bodily prowess. The tiger card represents inner strength as well as physical strengthIt is the strength that helps us overcome adversity, illness, hatred, and danger. This card is exemplary of strong will, moral strength, and resistance to temptation. It is the fortitude of quiet personal power and careful restraint of overwhelming emotion necessary to see the task come to a fruitful conclusion. SHADOW READING The shadow reading of strength might easily be weakness, either physical or mental. However, it might also be a facade of strength that you feel you have to show the world. Ask yourself who you are projecting that image of strength for and if it is making those around you believe that you do not need help. \nCORRESPONDENCES: ELEMENT: Fire FLORA: Oak, thistle, borage, cinnamon, parsley STONES: Sardonyx, turquoise, aragonite, mahogany obsidian SPELLWORK: Instilling strength of will and mind, recovering from tiness, dealing with a break-up or difficult ending, self-confidence"}, {"id": "2c86ae29-a07c-8040-968f-d26e9598a23d", "name": "BOAR", "oracle": "", "mystical": "", "content": "\nVICTORY: This card represents victory and success. Much of the mythology surrounding the importance of the boar comes from the Celts. The boar is a fierce creature associated with success in battle, power, victory, and fruitfulness. The boar card tells us that a great triumph or achievement is imminent and that a period of trial is reaching its end. It is a card for realizing potential and accomplishing goals. It encourages empowerment and growth. The boar tells us that we are on the right track, and this pathway will lead to riches, fulfillment, and greatness. If you read this card alongside other cards in a spread, it empowers those cards with its optimism and positivity. Boars are great foragers, and adaptive and versatile with their diet. The boar card may also reference the ability to make something out of nothing, and gain success in places often overlooked by others. SHADOW READING As well as being considered a creature of power and victory, the boar was heavily associated with battle and war by the Celtic people. The boar card may indicate a conflict standing in the way of your success, or an obstacle to be overcome. CORRESPONDENCES ELEMENT: Earth FLORA: Basil, bay, bergamot, goldenseal, pecan STONES: Citrine, howlite, pyrite, sunstone SPELLWORK: Attract success, money magick, new job or promotion, luck and fortune, gaining a good outcome in a decision or competition, fertility rites"}, {"id": "2c86ae29-a07c-8043-9c33-d822f6dbbeac", "name": "SNAKE ", "oracle": "", "mystical": "", "content": "Rebirth This card represents the cycle of rebirth and eternity. While the salamander carddc represents the re-growth of a part of oneself from destruction and chaos, the snake signifies a natural rebirth of the whole self. As a snake sheds and emerges clean and new from the sheath of dead skin, it reminds us of the constant cycle of life, death, and rebirth. We shed our skin and hair daily, and the remnants of our bodily self become dust on the air, in the earth, and in the water. This card asks us to consider our place in the grand cycle of things and reminds us that change is a natural part of life. Gnosticism adopted the Egyptian symbol of Ouroboros (the snake biting its own tail) into its teachings as a symbol of infinity and con-tinuity. The symbol was originally associated with the union between Ra, ancient Egyptian god of creation and of the sun, and Osiris, god of the dead. This union of life and death becomes a symbol of rebirth. This card may symbolize the infinity of time and its repetitive cycle. It expresses the need for renewal, change, and evolution in order for the cycle not to be constantly repeated. \nSHADOW READING: Unlike the butterfly card whose rebirth requires a great change, the snake's rebirth is superficial in comparison. Whilst they shed their skin to grow, they remain a serpent beneath, as opposed to a new being entirely. They are still inherently the same and unchanged. The shadow reading of this card may be warning you of shallowness, small-mindedness, or difficulty seeing another point of view. \nCORRESPONDENCES: ELEMENT: Earth FLORA: Hawthorn, lily, daffodil, crocus, snowdrop STONES: Unakite, angelite, chiastolite, jasper SPELLWORK: Past life regression, funereal blessings, birth blessings, Spring Equinox ritual, garden magick"}, {"id": "2c86ae29-a07c-8049-8944-cc959ed98aac", "name": "TURTLE", "oracle": "", "mystical": "", "content": "PEACE ☮️ This card represents the peacemaker, diplomat, and ally. In comparison to the Heron card , which symbolizes inner peace, this card encourages peace and friendship with others. The sea turtle is a natural gardener, grazing on seagrass which houses aquatic life, feeds other sea creatures, and allows space for underwater animals to breed, nest, and hide. This card encourages a peaceful environment where others around you may flourish. It asks you to work with others to maintain peace and cooperation. The sea turtle, as well as numerous other creatures mentioned within this deck, is under threat from pollution and climate change. They are also under threat as a result of fishing and poaching. In many North American Indigenous myths, turtles are associated with creation, the Earth mother, and supporting the Earth. This card may symbolize conservation, responsibility, and cooperation with the natural world. It is a reminder that we as individuals can make a difference, and that true peace often requires hard work. \nSHADOW READING: Chaos can rise and imbalance may rear its head. A calm sea can become a tempest and it can be difficult to navigate. You cannot solve everyone's problems and it is not your responsibility to do so. Be wary of trying to play peacemaker to those around you if they will not listen to reason, or if it is harmful to yourself. Know when to walk away. \nCORRESPONDENCES: ELEMENT: Water 🌊 FLORA: Aloe vera, poppies, cosmos, gardenia, lavender STONES: Chiastolite, jasper, rhodonite SPELLWORK: Settling an argument, allowing people to see each other's point of view, guard against conflict, garden magick"}, {"id": "2c86ae29-a07c-8059-a4b2-d2a771ab82da", "name": "HUMMINGBIRD ", "oracle": "", "mystical": "", "content": "\nENERGY: This card represents unbounded energy and zeal. If the Crab card represents the moon within this deck, then the hummingbird is the sun. In Aztec mythology, the hummingbird god Huitzilopochtli was the god of the sun, while Mayans considered the small jewel-like creatures to be the sun in disguise. The hummingbird card represents not only the energy that the sun produces but also the energy we take in. It is both energy given and energy received. This card is excitement, enthusiasm, and unrelenting vitality. While the salmon card is a marathon, the hummingbird card is a sprint. Just as hummingbirds have developed long beaks and tongues for the singular task of collecting nectar from long-necked flowers, the hummingbird card may symbolize a pinpointed, exact task at hand. However, this also might indicate tunnel vision and merciless hyper-fixation. Excitement for a task does not always mean that it should be a priority. \nSHADOW READING: The shadow reading of this card warns against things going too fast, It is the candle burning at both ends and in the middle at the same time! This card cautions against creative, psychological, and spiritual burnout. It represents mania as well as inattentiveness, and things falling to the wayside in the blur left behind. \nCORRESPONDENCES: ELEMENT: Air/Fire FLORA: Belladona, lovage, mint, oregano, fuchsia STONES: Calcite, ruby, zincite, quartz SPELLWORK: Gain energy, call extra energy and power into your spell work, aid with feelings of mania or erratic mood swings, summer rites, Summer Solstice"}, {"id": "2c86ae29-a07c-805c-936e-ce3e342bb861", "name": "SPIDER", "oracle": "", "mystical": "", "content": "\nCREATE: This card represents creativity and weaving one's imagination into being. By weaving our individual stories into words, music, dance, art, or any creation of our own making, we craft a web of our self for others to view. The spider card urges you to use your creativity and vision to explore your inner self and express it honestly. Druids believe that the spider is a weaver of the written word. The Druid Ogham alphabet, with its crossed lines, may be found in the web of a spider. The web may be seen as interconnecting stories and pathways, or a woven spiral from the past to the future. Many cultures see the spider as a weaver of fate and fortune. The spider card may be a message to create your own destiny. In West African and Caribbean folklore, Anansi is a spider with a human face who represents creativity, stories, cunning, and wit. Largely formed from oral tradition, stories containing Anansi were passed from West Africa to the Caribbean islands during the transAtlantic slave trade. Anansi's ability to outwit his oppressors and gain the upper hand made him a powerful symbol of slave resistance. The spider may symbolize the power of words and stories in fighting injustice. \nSHADOW READING: The shadow reading of the spider card indicates creative block or stagnation. It is the cobwebs that form in your mind when it is dusty and littered. It may also be urging you to try and find your creative voice once more after it has been lost in the mire of other people's demands. Make art for yourself and no one else, and try to rediscover your footing on the delicate web of creativity. \nCORRESPONDENCES: ELEMENT: Earth FLORA: Carnation, ginkgo biloba, mistletoe, vervain STONES: Alexandrite, celestite, zincite, opal SPELLWORK: Help with writer's/artist's block, luck with a publication, encouraging creativity and imagination, luck with a performance"}, {"id": "2c86ae29-a07c-806e-83ad-dda448496217", "name": "DOLPHIN", "oracle": "", "mystical": "", "content": "\nBALANCE: This card represents balance and equilibrium. Myths concerning dolphins can be found in cultures around the world where sailing is or was a dominant trade. In heraldry, two dolphins swimming in the same direction is a symbol of balance and stability. As mammals who breathe air, yet live in the suffocating sea, dolphins require a balance between air and water in order to survive. The dolphin card urges balance between different aspects of the self. It is stability in the face of a storm, and calming the tempest within to come to a better understanding. It is a hectic lifestyle that needs re-evaluation, or stressors that need to be addressed. This card may also be asking you to question if your mind, body, and spirit are in balance, or if upheaval might be necessary to achieve equilibrium in the future. This card may also represent those born under the Western Zodiac sign of Libra. ♎️ \nSHADOW READING: The shadow of the dolphin card is an imbalance to excess. This could indicate an obsession, addiction, or unhealthy fixation that is throwing you out of balance. This imbalance may also be affecting those around you and it might be necessary to re-connect with those who can help, or ground yourself in reality. \nCORRESPONDENCES: ZODIAC SIGN: LIBRA ♎️ ELEMENT: Water FLORA: Dahlia, carnation, geranium STONES: Agate, celestite, serpentine, fluorite SPELLWORK: Emotional balance during a difficult time, psychological balance and aid for mental turbulence, aiding those with addiction"}, {"id": "2c86ae29-a07c-8070-8422-e7a52b4c10c5", "name": "RACCOON DOG", "oracle": "", "mystical": "", "content": "\nTRICK: This card represents illusion and daydream. The raccoon dog card may warn you to look before you leap, but also reassure you that the leap itself is a part of the fun. It is a card of seeing opportunity in chaos and confusion, creative problem-solving, and learning on the job. While similar in appearance to the raccoon or badger, the Japanese raccoon dog (tanuki) is believed to be unrelated to either. In Japanese folklore, the tanuki has a rich cultural significance and background. They are tricksters and shapeshifters, and often associated with mischief and pranks. The raccoon dog card urges you not to take things too seriously and encourages you to be curious, generous, and cheerful. The raccoon dog may portend success after taking a risk, or encourage you to take the risk you have been considering. Yet it is also a reminder that success is not guaranteed and that we can learn from our mistakes, as well as from the experience of the journey we took. SHADOW READING The tanukis of 16th- and 17th-century Japanese stories were conjurers and shape-shifters who could transform into animate and inanimate objects to trick their quarry. Before they became the benevolent rogues of current folklore, they were considered misleading and dangerous. The shadow reading of this card may be warning you that something is not as it seems and that the rug may soon be pulled out from under you. \nCORRESPONDENCES: ELEMENT: Earth FLORA: Rosemary, peppermint, lotus, bay, snapdragon STONES: Onyx, thulite, topaz, diamond, idocrase SPELLWORK: Encouraging the mind to think outside the box, prosperity in business, encouraging generosity and cheerfulness, protection from deceit"}, {"id": "2c86ae29-a07c-8079-812f-f352d6465677", "name": "SALAMANDER", "oracle": "", "mystical": "", "content": "\nGROW: This card represents growth from destruction, like a sapling growing out of the ashes of a wildfire. Despite being an amphibious creature, the salamander has long been associated with the element of fire in myths and lore spanning back to ancient Greece. The origin of this connection is often disputed, with some believing it may stem from salamanders who hibernated in rotting logs only to burst forth when the logs were taken indoors and burned. This gave the illusion that these creatures were born from flame. While they are in fact cold-blooded and, contrary to old wives' tales, not flame-retardant, this association with heat and fire has persisted. Salamanders, like some reptiles, are capable of re-growing certain limbs after an accident. The salamander card may signify hope and recovery after a difficult time. While the symbol of fire can be one of destruction and harm, it also represents the heat of the hearth, the warmth of the home, and the light in the darkness. The type of growth that the salamander card invokes is re-growth from a period of diffirence  a tumultuous upheaval or traumatic experience. \nSHADOW READING: A shadow reading of the salamander card could portend an upheaval to come or a learning experience from which you can grow and change. As a cold-blooded creature associated with the heat of fire, this card could be encouraging you to equalize your passions. It could be a symbol of opposite forces working against each other which need to be balanced. CORRESPONDENCES ELEMENT: Fire FLORA: Fire poppy, mesquite, lotus, patchouli STONES: Carnelian, emerald, zoisite, agate, green apophyllite SPELLWORK: Encourage new growth after a disastrous situation, fire magick, candle magick, protecting or recovering from a destructive force, garden magick"}, {"id": "2c86ae29-a07c-807f-9b46-d7b8989d44ca", "name": "FOX", "oracle": "", "mystical": "", "content": "Cunning This card represents shrewdness, wit, and astute intellect. Before Christianity subverted the fox into a creature of deceit, they were revered by the Celts as a being of wise counsel and logical reasoning.  The fox's pelt was said to contain great magick, and cunning was seen as a positive trait necessary for the tactics, logic, and diplomacy of war. The fox card in this deck represents a tactical and knowledgeable person, one who prefers words over action. The fox is a stealthy and clever predator, and the fox card might be urging subtlety and tact in pursuing one's goals. A heavy hand is not always necessary and the fox card encourages refinement and delicacy. Foxes are adaptable creatures, and by approaching the problem rationally and with a delicate hand, you will best discern how to move forward. \nSHADOW READING: Much like the raccoon dog, the fox is often associated by both Asian and North American mythology with being a trickster or shapeshifter. The shadow of this card may warn you to be careful of those who could manipulate you, or use their words to make you question yourself. \nCORRESPONDENCES: ELEMENT: Earth FLORA: Aspen, primrose, foxglove, citronella STONES: Muscovite, amethyst, aquamarine, blue kyanite SPELLWORK: Promote wit and logic in difficult situations, deal with manipulative people, protection from being taken advantage of, warding against feeling tongue tied"}, {"id": "2c86ae29-a07c-8081-8723-fe4970f563ba", "name": "ELEPHANT", "oracle": "", "mystical": "", "content": "MEMORY This card represents our ancestors and those we remember who have passed on. Elephants have excellent memories, and often recall difficult routes and terrain to survive drought. They are also one of the few species on Earth, other than ourselves, recorded to have funerals. They lay leaves and sticks over deceased elephants and stand watch over their bodies for days at a time. These intelligent and compassionate animals inspire reverence for the memory of those no longer with us. This card is a reminder that those gone are not forgotten, and to learn from those we have lost. It is respect for elders and acceptance of wisdom. This card might also call you to look into your past or heal your mind and spirit. Past life regression, trauma therapy, or shadow work might be necessary to combat old wounds and painful memories. You may be dealing with the grief of a loss, through either death or absence. This card encourages you to take time to mourn and learn from your memories. SHADOW READING The shadow of the elephant card is forgetfulness. While this can be seen negatively in terms of absent-mindedness, it can also indicate lecting go of painful memories and not paying heed to that which does not serve us. Much like the light reading, which tells us to learn from the memories of loss, the shadow tells us to learn but then discard the pain. CORRESPONDENCES ELEMENT: Earth/Spirit FLORA: Forget-me-not, lilac, caraway, bergamot, periwinkle STONES: Black calcite, howlite, quartz, SPELLWORK: Samhain ritual, easing the loss of a loved one, helping to train memory, guarding against memory loss, past life regression"}, {"id": "2c86ae29-a07c-8082-9acf-e02385cf645a", "name": "MOTH", "oracle": "", "mystical": "", "content": "Death The word \"death\" may at first cause you discomfort, but in the natural world death is an essential part of rebirth, new growth, and sustaining life. While you may choose to view this card as a representation of physical death, understand that it also signifies symbolic death. This card may mean the end of a journey, the end of a relationship, or the end of an attachment. It may also represent the end of one path and movement on to the next. While the moth is known as a creature of shadow and night, we must remember that it is always seeking out the light. Leaves may fall and rot into the earth, but their decay feeds new growth. This card may symbolize hope and happiness in the face of life-changing events or endings, or a new beginning after a life-changing event. The moth card may be urging you to let go of old thoughts, traumas, and anxieties that stagnate your mind. Or to cut bad habits from your life that may be holding you back from real change. \nSHADOW READING: A change is on its way whether we like it or not. Perhaps we are not prepared. Looking forward and toward the future can be scary and unnerving, especially when we are unsure of the route we must take. The moth may fly too close to a flame and burn. A life-changing event may be on its way. \nCORRESPONDENCES: ELEMENT: Air/Spirit FLORA: Alder, bluebell, cypress, elder, willow STONES: Chiastolite, amethyst, hyalite SPELLWORK: Samhain ritual, funereal blessings, ancestor work, speaking to those beyond the veil, blessing a new beginning after a big life change, dealing with grief"}, {"id": "2c86ae29-a07c-808c-8d53-eb97b8faeea0", "name": "GOAT", "oracle": "", "mystical": "", "content": "\nDEAL: This card represents a pledge or contract. In Greek mythology, the goat is associated with the god Pan, who is, in his essence, nature untamed. This god was later inverted by Christian mythology to symbolize the devil and consequently much lore regarding the goat is swept up in themes of evil, devilry, and deception. The goat was often associated with witchcraft and regarded as a witch's familiar, with some believing that the goat was the devil himself who came to make a pact with a fledgling witch. This card is a pact or promises to be made. It is a sign of bondage to a person, institution, or cause. The goat is highly adaptive and resilient. Goats are excellent climbers and browsing grazers, making them hardy animals. They are agile in difficult terrain and able to surmount great natural obstacles. The deal card may symbolize a dependable contract, able to withstand significant changes and challenges. This card may be emblematic of a partnership, marriage, or union which has seen tough times but always manages to overcome difficulties. This card may also represent those born under the Western Zodiac sign of Capricorn. ♑️ SHADOW READING The shadow reading of the deal card indicates the god of the old world rather than the devil of the new. It is unbridled nature and spirit which cannot be tied down to material promise. The shadow reading of this card is chains broken, ridding oneself of an undesirable contract, or freeing yourself from bondage. CORRESPONDENCES ELEMENT: Earth FLORA: Almond, Solomon's seal, skullcap STONES: Sapphire, tanzanite, jasper SPELLWORK: Breaking unhealthy bonds or connections, releasing yourself from promises of a past life, blessing a covenant or promise"}, {"id": "2c86ae29-a07c-809b-9a79-e365dee75dd9", "name": "RAM", "oracle": "", "mystical": "", "content": "\nPOWER: This card represents force and power. In ancient Rome the ram was associated with the god Jupiter, the chief deity and god of the sky, thunder, oaths, and judgment; while in Celtic belief a ram-headed serpent is associated with Cernunnos, himself a horned god of nature and power. Horned and antlered creatures have long been associated with virility, aggression, potency, and strength. The sacrifice of rams, ewes, and lambs has long been documented in many ancient cultures as a way to gain the blessings of the gods. This card is symbolic of power, might, and vigor. If you are using your reading to query about a person, this card may symbolize someone in a position of authority or respect. When dealing with the self, this card may symbolize your own inner power or strong, passions. When reading this highly potent card alongside other cards, it imbues them with extra zeal and influence. The reading is magnified and empowered, taking the meanings to a more intense conclusion. This card may also represent those born under the Western Zodiac sign of Aries. ♈️ \nSHADOW READING: The shadow meaning of the ram card is linked to the responsibility and accountability of those in power. This card may symbolize power corrupted or subverted. It is a position of authority that is not answering to those over whom it has power. \nCORRESPONDENCES: ZODIAC: ARIES ♈️ ELEMENT: Fire 🔥 FLORA: Bergamot, cedar, myrrh, sunflower STONES: Alexandrite, cinnabar, royal plume jasper SPELLWORK: Gain confidence in the face of those who might undermine you, amplify the power of other spellwork, a blessing on physical competition or exertion, Imbolc ritual"}, {"id": "2c86ae29-a07c-809b-b7bb-e67a89b20583", "name": "DEER ", "oracle": "", "mystical": "", "content": "\nKINDNESS: This card represents kindness and understanding. The deer is often associated with innocence and purity in Christian mythology, inspiring conversion and piety. In Greek mythology, Heracles' son Telephus was abandoned by his mother in the countryside, where a doe suckled and cared for him, keeping him alive. The deer's kindness is selfless and compassionate. It is a sweet kindness and friendship fueled by unconditional generosity. This card heralds positive social interactions and new friendships. It also urges openness to charity and the kindness of other people. The innocence and purity of the deer card asks you to enter into a relationship, decision, or experience with a light and open heart, as if unburdened by hurt. It urges you not to filter this new experience through past pain or trauma, and treat the situation as fresh. Be kind to yourself and others and allow this fresh beginning into your life. This card may also represent those born under the Western Zodiac sign of Virgo. ♍️ \nSHADOW READING: The shadow reading of the deer card may be a warning against naiveté and childish gullibility. It also indicates kindness in the extreme, which may lead to being taken advantage of or exploited. \nCORRESPONDENCES: ZODIAC’S SIGN: VIRGO ELEMENT: Earth FLORA: Yellow rose, gladioli, bluebell, myrtle, acacia STONES: Pink chalcedony, jade, jasper, SPELLWORK: Strengthen or encourage bonds of friendship, attract friends into your life, aid someone in seeing another point of view, Spring Equinox ritual"}, {"id": "2c86ae29-a07c-809f-a45e-c703967805cb", "name": "BUTTERFLY", "oracle": "", "mystical": "", "content": "\nTRANSFORM: This card represents change and transition. Butterflies have long been associated with transformation due to their elegant transition from caterpillar to butterfly. This card may symbolize a physical transformation. However, the butterfly's association throughout myth and lore with the soul might indicate a deeper, more intrinsic change. Many cultures represent the butterfly as a vessel for a traveling soul, for good or ill omen. The presence of the butterfly in your reading may indicate a choice or transformation after a period of soul searching, and the rebirth of the soul with new purpose, form, or meaning. In the Sierra Madre hills, Mexico, the migration of monarch butterflies has taken place around the time of Dia de los Muertos (the Day of the Dead) since pre-Hispanic times. Many people associate the butterflies with the souls of loved ones, returning to families and friends for the celebrations. This card could be seen as a comfort to those who have lost someone. If you believe in an afterlife or rebirth, it is a reminder that these loved ones continue. If you do not, it is a sign of their energy being released into the universe and passing into nature. \nSHADOW READING: When dealing with themes of rebirth and metamorphosis, remember that something must end so that something new may take its place. Caterpillars must destroy themselves, dissolving to become the beautiful winged creatures we know. The destruction before a transformation may be difficult, and change can fill one's heart with fear, but this card reminds you that the destination is worth the journey. \nCORRESPONDENCES: ELEMENT: Air FLORA: Protea flower, strawflower, peppermint STONES: Charoite, malachite, opal SPELLWORK: Manifesting change, aiding a transition, new job, moving on from a relationship, spring rites, Beltane ritual"}, {"id": "2c86ae29-a07c-80a8-b3d6-ced08cec635f", "name": "CHAMELEON", "oracle": "", "mystical": "", "content": "\nDISGUISE: This card represents disguise and façade. It is the idea of biending into one's social landscape to fit in, but also in order to acclimate to new surroundings. The natural camouflage of the chameleon might be interpreted as deceptive or duplicitous in one reading, but it may also signify the need to protect oneself by blending in and becoming invisible. This card could symbolize a wallflower who feels invisible or a social butterfly who can adapt and thrive in any social situation. While we largely associate the chameleon's color changing ability with camouflage, it is also used to signal their intentions, health, temperature, and feelings. The chameleon card may represent wearing your heart on your sleeve and allowing your deeper feelings to show. This card may also represent those born under the Western Zodiac sign of Gemini. ♊️ \nSHADOW READING: While hiding from danger can seem like the best course, and is a valid tool for survival, you must be careful not to blend in so fully that you lose yourself. Take time to recover from the danger, heal yourself, and learn to live boldly once again. Do not be afraid to show the bright colors of your personality to the world. CORRESPONDENCES ELEMENT: Earth FLORA: Amaranth, chicory, monkshood, poppy, skeleton flower STONES: Bloodstone, tiger's eye, chrysoprase, tourmaline SPELLWORK: Protection from those who seek you, to aid in difficult social situations, making new friends, aiding social acceptance"}, {"id": "2c86ae29-a07c-80af-aaf4-e178b040c474", "name": "RAVEN ", "oracle": "", "mystical": "", "content": "\nSECRETS: This card represents hidden secrets, the gathering of knowledge, and the spreading of rumors. As the ravens Huginn and Muninn reported their findings to the Norse god Odin, the raven card urges you to discover the truth behind hidden secrets. It may warn of a secret about to be revealed, for better or worse. This card may be preparing us for a difficult realization or exposed trauma. Just as Huginn and Muninn represented reflection and memory, the raven card may also be urging us to confront a secret of our own and question why we are hiding this part of our life from others. It does not judge but merely presents us with what it sees. Se prepared to look at the secrets shown to you with compassion and understanding, to gain wisdom from what they have to teach you about others and yourself. \nSHADOW READING: Hurdul gossip, misinformation, and scandal may be plaguing you. Sometimes the truth is not something you wish to hear, and sometimes others' truths are not necessarily the same as your own. You cannot control how other people think about you, but you can control your reactions. Assess your own truth and stay strong. CORRESPONDENCES ELEMENT: Air FLORA: Daisy, holly, black-eyed Susan, elm, oak, slippery elm STONES: Onyx, obsidian, celestite, lapis lazuli SPELLWORK: Quell rumor or misinformation, past life work, gaining secret wisdom or accessing ancient mystery"}, {"id": "2c86ae29-a07c-80b0-a2c9-e3bf4fc34e82", "name": "SALMON ", "oracle": "", "mystical": "", "content": "DETERMINATION This card represents determination and steadfastness. Salmon are migratory fish who spawn in freshwater, journey to the ocean, and then swim the long and difficult return upstream to their spawning ground, where they procreate and die. They are revered by the Celts, Druids, and Indigenous North Americans, often symbolizing wisdom, the cycle of the year, and renewal of the world. Their path home is treacherous, with predators such as bears, birds, and anglers standing in their way. But the salmon perseveres despite these obstacles. This card is a symbol of hard-won achievement and willpower in the face of great odds. While the hummingbird card is a sprint, the salmon card is a marathon. This card is reassuring you that you are on the right path, even though it may seem treacherous, and urging you to stick by your convictions. The salmon's natural ability to find their way home may imbue this card with a feeling of return, navigation, and finding one's way back to a place of acceptance. This card may also represent those born under the Western Zodiac sign of Pisces. ♓️ \nSHADOW READING: One shadow reading of the salmon card is the feeling of being lost on your path. Oftentimes we take new pathways, streams, and rivulets, and they seem like a new direction altogether. You might feel lost or like you have made a bad decision. Try not to focus on the feeling of deviation and instead focus on the journey. Rivers lead back to the sea eventually. CORRESPONDENCES ZODIAC’S SIGN: Pisces ♓️ ELEMENT: Water 🌊 FLORA: Allspice, balmony, dahlia, amaryllis, garlic STONES: Jasper, pyrolusite, orange calcite, hematite SPELLWORK: Aid in focus on the path at hand, blessings before a trial, spellwork for a new job or long-sought goal"}, {"id": "2c86ae29-a07c-80bc-8109-fce633344e03", "name": "CRAB", "oracle": "", "mystical": "", "content": "\nCARE: This card represents self-care and navigating the sea of strong emotion. If the hummingbird card represents the sun within this deck, then the crab is the moon. In western astrology, the crab is affiliated with the star sign Cancer, whose ruling heavenly body is the moon. In Rudyard Kipling's Just So Stories, a giant crab makes the sea rise and fall, just like the moon's power over the tides. The moon is often associated with strong emotion, the soul, energy, and feeling. The crab card symbolizes the ebb and flow of strong emotion, and taking control of the tides of feeling, whether they are calm seas or destructive tsunamis. Crustaceans live in a casing of thick armor, which guards them against predators and the potential violence of the water around them. This card is a symbol of empathy, therapy, and self-care. It urges you to recognize the destructive forces of negative emotion and take steps to guard yourself against them. The crab card is a reminder not to allow strong waves of emotion to overtake you and destroy you, but to ride the waves and find your safe harbor. This card may also represent those born under the Western Zodiac sign of Cancer. ♋️ \nSHADOW READING: A shadow reading of the crab card could be a warning that the waters have reached far over your head, and it is difficult to see the surface. Emotions, feelings, invasive thoughts, and destructive anxiety have overwhelmed you and it is time to swim for shore. \nCORRESPONDENCES: Zodiac’s Sign: Cancer ELEMENT: Water FLORA: Jasmine, St. John's wort, motherwort, benzoin STONES: Moonstone, rhodonite, garnet, labradorite SPELLWORK: Self-care, calming strong emotion, healing work for mental illness, lunar magick"}, {"id": "2c86ae29-a07c-80bd-8bcc-feabaff4f759", "name": "VULTURE", "oracle": "", "mystical": "", "content": "CONSUME This card represents the union of life and death, consuming that which has died in order to live. Many of the mythologies surrounding the vulture are in opposition to one another. While the ancient Egyptians associated the bird with life-giving, fertility, protection, and feminine deities, the ancient Greeks and Romans associated the bird with war, destruction, ill omen, and masculine deities. The vulture card may be asking you to confront your own duality, or how the opposites within yourself complement you as a whole. As a carrion bird, the vulture is fundamentally linked to death, but it is through their scavenging that they feed themselves and their young. Just as the death of one creature nourishes the life of another, remember that we are three-dimensional imperfect beings made up of negative and positive traits. Our shadow may nourish our light as we learn and accept our own imperfections. The vulture was often used as an agent of vengeance in Greek myths, such as the vulture (though some translations also state \"eagle\") who tortured Prometheus at Zeus's behest. Vengeance as an emotion can consume and must be kept in check. This card asks you to take care that vengeance and overwhelming negative emotion do not consume you, and to find the balance between light and dark. \nSHADOW READING: The shadow reading of the consume card represents a conclusion that is difficult to swallow, either about those around you or about yourself. There may be a conflict or contradiction that is not easy to resolve right now, or hypocrisy you have discovered that unsettles you. Sit with this discovery and allow it to digest. \nCORRESPONDENCES: ELEMENT: Air FLORA: Galangal root, black-eyed Susan, chestnut STONES: Rhodonite, red jasper, fire opal, black obsidian SPELLWORK: Urging justice upon one who has harmed you, reversing hexes, shadow work, dealing with past life trauma, confronting one's own faults"}, {"id": "2c86ae29-a07c-80c3-87fb-ddeceafd8910", "name": "JELLYFISH ", "oracle": "", "mystical": "", "content": "\nINTENTION: This card represents intention and psychological sensitivity. The jellyfish is near translucent, undulating and streaming, mimicking the water. Despite seeming to move with the ocean, jellyfish have intent and purpose, propelling themselves and creating small vortexes in their wake. While the salmon card (page 96) projects the idea of swimming against the current, the jellyfish encourages you to work with the current to find your way. It is a card of going with the flow and trusting the process. Setting your intention is the first step. Trusting in the universe and the path it has set for you is the second. Jellyfish are sensitive to changes in water temperature and have become an unwitting omen of climate change. As waters become warmer and the oceans are disrupted, coral is dying and jellyfish are gathering more frequently and outside of their regular habitats in great numbers (known as jellyfish blooms). These mass gatherings can lead to altered nutrients in the water, creating a ripple effect on other animals and plant life. This creature's sensitivity to change is ominous of danger and impending doom in our climate. The jellyfish card urges awareness of the world around us. It is a card of changing our intention to something better and more beneficial. SHADOW READING The outstretched, translucent arms of the jellyfish are difficult for prey to see until it is too late. The shadow reading of this card tells us to be careful of hidden dangers and use our intuition to find safer waters. If we cannot find safer waters, we might need to work on making the waters around us safe so that we may swim without fear. CORRESPONDENCES ELEMENT: Water FLORA: Arnica, bistort, acacia, damiana STONES: Magnetite, dioptase, rainbow moonstone, aqua aura SPELLWORK: Setting intention, heightening psychic power, divination magick"}, {"id": "2c86ae29-a07c-80c3-8a29-e91dd1eca103", "name": "BAT", "oracle": "", "mystical": "", "content": "\nCOMMUNICATE: This card represents communication and connection. Animals from bats to dolphins use echolocation to scout the world around them, hunt down prey, find mates, or detect obstacles in their path. This form of communication with the world is alien to our own human processes, and yet increasingly familiar, as our species has begun to communicate electronically. This card symbolizes connection to the invisible, as well as connection to the world around us. In Navajo mythology, the bat is a nighttime emissary for the Talking God, carrying messages where ordinary people cannot. This card might encourage you to talk through your problems even if they seem insurmountable. The awen symbol which sits behind the bat is a Druid symbol for the spirit of poetic inspiration sent from nature or the gods. It has become popular in neo-Druidry as an emblem of the spirit of life which flows within music, poetry, and stories. Druid bards are musicians, storytellers, and artists who use their art to communicate ancient stories, philosophy, and their understanding of nature. Like the bat who carries messages through the shadows of mystery, the bard communicates mysteries which we aim to solve through listening and interpretation. This card reminds you to express yourself and find your voice. It may also urge you to acknowledge the hidden messages that have been troubling you. SHADOW READING The bat in Aesop's fables is considered a creature of deception, neither bird nor mouse. When associating this story with communication, it is a warning to look out for those who speak falsely or claim to be something that they are not. It might also symbolize blocked communication, stubbornness, and misunderstandings. CORRESPONDENCES ELEMENT: Air FLORA: Club moss, mint, iris STONES: Celestite, cerussite, blue chalcedony, wulfenite SPELLWORK: Ancestor work, divination, luck or blessing on a speaking engagement or presentation, encouraging clear communication"}, {"id": "2c86ae29-a07c-80d5-9281-d24220daacdb", "name": "CROCODILE ", "oracle": "", "mystical": "", "content": "\nPATIENCE: This card represents patience and consideration. Crocodiles are ambush predators and their strategy involves waiting and educated prediction. They observe the habits of their prey, monitor watering holes, and strike only when ready. This card is a symbol of careful judgment and deliberation. It urges caution, warns against impulsive decisions, and advises you to weigh your options. The presence of the crocodile in your reading might also indicate that there is no easy answer to your question, or that whatever you are deliberating will be a complex decision. Associated with water-serpents and sea monsters, the mythological crocodile has a fearful reputation. Crocodiles have been revered by many cultures the world over, from the ancient Egyptian god Sobek to the crocodile guardian of the Goan people of Adulshem. Their prehistoric appearance and slow predatory style, leading to explosive and devastating attacks, make them similar to the shark in many ways. In Indonesia, a popular myth sees the shark and crocodile battle each other, with the shark taking control of the water and crocodile the land. Read alongside the shark card (page 102), the crocodile may be seen as the earth equivalent to the shark's watery, intangible fear. The crocodile is a more definite and corporeal problem that can be solved, rather than one of the mind. SHADOW READING While the hunting crocodile seems placid and still on the surface of the water, this patient predator bides its time before ultimately attacking. The shadow reading of the crocodile card may caution you not to become stagnant due to indecision. Sometimes decisive action must be taken to seize your prey. It may also be read as guidance not to push someone's patience too far. CORRESPONDENCES ELEMENT: Earth/Water FLORA: Galangal root, balmony, astilbe, fern STONES: Blue lace agate, obsidian, aquamarine SPELLWORK: Promoting coming to a decision, promoting patience, a positive outcome of a judgment"}, {"id": "2c86ae29-a07c-80d8-95ea-da634f400266", "name": "SWAN", "oracle": "", "mystical": "", "content": "LOVE This card represents love in all of its forms, be it romantic, platonic, familial, sexual, or self-love. Swans mate for life and have become symbolic of true love, commitment, and long-lasting affection. This card implies the finding of love, as well as the giving of love. It is emblematic of commitment, loyalty, partnership, and faithfulness. The swan card may also symbolize self-love and acceptance, overcoming self-doubt or hatred to see the beauty within. When we are reminded of Hans Christian Andersen's tale of The Ugly Duckling, we might understand this card to show us that we hold true beauty no matter what our inner or outer saboteurs may say. \nSHADOW READING: Folklore and mythology revolving around \"Swan Maidens\" exists all over the world, associating the swan with marriage, love, and romance. However, many of these stories end with tragedy or begin with entrapment. A shadow reading of the swan card may represent the dangers of co-dependence and losing the self when one is in a relationship. It may also represent a destructive relationship from which one needs to escape. \nCORRESPONDENCES: ELEMENT: Water FLORA: Bleeding heart flower, rose, butterbur, cardamom STONES: Rose quartz, diamond, emerald, jade, opal, rhodochrosite SPELLWORK: Attracting love into your life, blessing a union, sex magick, self-love and confidence, Beltane ritual, spring rites"}, {"id": "2c86ae29-a07c-80dd-9f95-d1f7a357e23b", "name": "JACKALOPE", "oracle": "", "mystical": "", "content": "BELIEVE This card represents belief and appreciation of the unknown. The mythological jackalope, a rabbit or hare with the horns of a deer or antelope, is found in folklore all over the world. As well as being a popular cryptid in North American folklore, tales and depictions of horned rabbits can be found across continents, from the oral legends of the Wixárika people in Mexico to the single-horned Al-Miraj of Iranian myth. This creature has existed through hybrid taxidermy, art, and stories for centuries and consistently ignites the imagination of storytellers through the present day. Despite being a mythological cryptid, the jackalope's origin is commonly attributed to actual sightings of rabbits and hares suffering from a condition known as Shope papillomavirus, which causes them to develop horn-like growths on their bodies. The jackalope reminds us that many unbelievable stories begin with fact, and to appreciate magick in our everyday. This card encourages unique perspective and eccentricity, and is a symbol of powerful creativity. It carries the message to believe in yourself, and know that there are forces within you that have yet to be seen or believed by others. SHADOW READING The shadow of the jackalope card is belief and imagination taken to excess. You may become lost in your own dream world and forget to come back down to Earth. Often that world may seem safer or more accepting, while the real world is harsh and difficult. But with your creativity, you can find a balance between both worlds. CORRESPONDENCES ELEMENT: Spirit FLORA: Hawthorn, violet, elecampane STONES: Pineapple amethyst, alexandrite, merlinite SPELLWORK: See the unseen, fairy magick, encouraging imagination and inspiration, connecting with the otherworlds, promoting visions"}, {"id": "2c86ae29-a07c-80e1-a4be-fab3edea1193", "name": "SHARK", "oracle": "", "mystical": "", "content": "FEAR The shark card represents the unknowns of life and the fear that they create. It is the flight or fight response that we feel when faced with something scary or unfamiliar. This beautiful yet terrifying prehistoric predator has often been associated by humans with danger, violence, and death; from lore and stories of the sea to modern cinema. Yet most sharks are not dangerous to humans, with rare shark attacks being accidents of curiosity or confusion rather than attempted hunts. This card encourages you to respect your fears and seek understanding of them rather than letting the initial dread overwhelm you. This card advises us to look for the truth behind our fears and figure out what is real and what has been manifested by our trauma. Often we are more scared of the fin above the surface of the water or the dark shadowy depths beneath than we are of sharks themselves. Only by facing our fears and traumas honestly can we begin to manifest true courage and heal ourselves. \nSHADOW READING: Not all fears are imagined. Some are very real. Sometimes our fears are well-founded and based in the here and now. While sharks are not the malevolent creatures pop culture may have you believe, they are still dangerous predators. Respect that your fear may be justifiable and reasonable, and be ready to act if necessary. Making the right choice between fight or flight is an important part of survival. \nCORRESPONDENCES: ELEMENT: Water FLORA: Agrimony, basil, nettle, wood betony, yarrow STONES: Diamond, idocrase, jet, labradorite, peridot SPELLWORK: Alleviate fear or bring psychological strength before a difficult event, dealing with trauma, shadow work"}, {"id": "2c86ae29-a07c-80e3-99fa-e2238e876cba", "name": "OWL ", "oracle": "", "mystical": "", "content": "\nWisdom: This card represents wisdom and learning. In ancient Greece, the owl was associated with Athena, the goddess of wisdom. The owl card is the sage, the teacher, the mentor, and the shaman. This card encourages reasoning and deep understanding; organization and analysis; thought and consideration. This card may symbolize the passing on of knowledge to another and the sharing of wisdom within a community or group. The owl may urge you to lead by example. It is the card of authoritative guidance and asks you to learn from those with more knowledge and experience than yourself. It advises you to deliberate carefully on a decision, but not to the point of paralysis, for your own wisdom and the wisdom you gather from those you trust will guide you along the right path. SHADOW READING When wisdom and experience go ignored, the battle is lost. The owl card may represent distorted fact and stubborn belief. The shadow of the owl card might also warn you of ignorance and foolishness within yourself or others. CORRESPONDENCES ELEMENT: Air FLORA: Acorn, rosemary, cinquefoil, elder, milk thistle STONES: Merlinite, amethyst, hematite, gold tiger's eye, sapphire, serpentine SPELLWORK: Luck on a test or exam, study aid and meditation, help with finding an answer to a difficult question"}, {"id": "2c86ae29-a07c-80ea-b52a-c4c087311280", "name": "LION ", "oracle": "", "mystical": "", "content": "\nCOURAGE: This card represents bravery. The lion has long been held as a symbol of courage and valor, from Christian mythology to the inversion of the trope in The Wizard of Oz. From ancient Mesopotamia to Iran, Greek mythology to Arthurian legend, the lion has signaled honor and virtue. It is often associated with monarchy and leadership. Many monarchs known for their courage have taken the name of the lion, while the lion in heraldry symbolizes that same trait. The appearance of this card in your readings encourages nerve, valor, and heroism. road. When faced with temptations of vengeance, anger, or the easy way through a situation, taking the high road can often be the most courageous and difficult step. It is a message to not let oppressors get you down, or situations overwhelm you. This card may also represent those born under the Western Zodiac sign of Leo. ♌️ SHADOW READING When the lion card appears in its shadow state, courage and bravery are diminished. The inversion of bravery into fear is coupled with self-doubt, self-loathing, imposter syndrome, and a lack of confidence. CORRESPONDENCES ELEMENT: Fire FLORA: Borage, columbine, iris, mustard, pepper, yarrow STONES: Bloodstone, garnet, labradorite, peridot, variscite SPELLWORK: Gaining courage in the face of adversity, overcoming fear"}, {"id": "2c86ae29-a07c-80ee-b7c9-e65f33dfe5d6", "name": "CAT", "oracle": "", "mystical": "", "content": "\nMYSTERY: This card represents mystery and magick. From the animal familiars of European folklore and witchcraft, to the totems and spirit animals of shamanic practice and many North American Indigenous cultures, people the world over have viewed animals as guides into the realm of magick and the inner workings of the soul. This card symbolizes a gateway into magick, mystery, or dream, whether that manifests through faith, spirituality, or magickal practice. Cats were sacred animals in ancient Egyptian society and were associated with many deities, including Isis and Bastet. In Norse mythology, cats are said to draw Freyja's chariot, while in the Muslim faith the creatures are revered due to their cleanliness. In Chinese folklore, cats were considered the original caretakers of Earth. This card may represent a powerful magickal or divine influence. The cat is both independent and social. They are both caring, empathetic creatures and deadly predators. Cats are complex beings who may be hard to read. This card reminds us that magick can be difficult to interpret, but to trust in what the universe has in store for you. On the surface, the shadow reading of this card may warn you of ill omens, malicious individuals, or ill wishes. The black cat has often been maligned by folklore and Christian history as a portent of bad luck and evil. This is primarily a result of the demonization of cats as witches' familiars during the European and early American witch trials, and has sadly endured as a superstition today. The shadow meaning of this card may warn you against seeing misfortune or curses where there are none. Superstitions can be a simple coincidence, and bad luck does not necessarily indicate a curse. CORRESPONDENCES ELEMENT: Spirit FLORA: Primrose, carnation, catnip, cinquefoil, myrrh, violet STONES: Labradorite, lapis lazuli, merlinite, opal SPELLWORK: Past life regression, divination, seeking answers, amplifying other spellwork, Samhain ritual"}, {"id": "2c86ae29-a07c-80ff-9bf6-f60e06cce95a", "name": "HAWK", "oracle": "", "mystical": "", "content": "\nHunt: This card represents the hunt and the pursuit of one's goals, forsaking all else. The hawk is a predatory creature, known for keen eyesight and revered for swift, decisive aerial action. The Celts associated the bird with foresight and acuity. The hunting technique of falconry, still used today, was once referred to as hawking and is believed to have existed for thousands of years. This card symbolizes a chase or hunt, with a fixation on a specific target. It is the pursuit of a goal or outcome with a streamlined, sniper-like focus. This card may communicate that you will soon find something you once thought lost. It is a symbol of a successful hunt for something that has long eluded you, or that you thought you could never achieve. If you are using this reading to decide on a new course in life, now might be the time to try something you have always wanted to do but thought was out of your reach. Those who do not seek will never find. This card may also represent those born under the Western Zodiac sign of Sagittarius. ♐️ \nSHADOW READING: The shadow reading of this card might draw your awareness to the figurative blinders or hood over your eyes, like a trained captive hawk, which may keep you from seeing the bigger picture. It is tunnel vision, inflexibility, and being ignorant of the needs of others. \nCORRESPONDENCES: ZODIAC’S SIGN: SAGITTARIUS ELEMENT: Air FLORA: Mistletoe, mace, orchid STONES: Amethyst, black tourmaline, smoky quartz SPELLWORK: Promoting focus on a singular task, finding lost things"}, {"id": "2cc6ae29-a07c-802b-8e49-da0d9e38f526", "name": "NARWHAL", "oracle": "", "mystical": "", "content": "NARWHAL"}, {"id": "2cc6ae29-a07c-8039-a3cf-d3793cc73c9f", "name": "COW", "oracle": "", "mystical": "", "content": ""}, {"id": "2cc6ae29-a07c-807a-8e3d-c4ba5058975d", "name": "PEAFOWL", "oracle": "", "mystical": "", "content": ""}, {"id": "2cc6ae29-a07c-80a4-921f-dc3101731fe6", "name": "WOLF", "oracle": "", "mystical": "", "content": ""}, {"id": "2cc6ae29-a07c-80b0-832a-d7b04fa8a9a7", "name": "SEAHORSE", "oracle": "", "mystical": "", "content": ""}, {"id": "2cc6ae29-a07c-80b8-ac5c-d212506ec0ac", "name": "WREN", "oracle": "", "mystical": "", "content": ""}, {"id": "2cc6ae29-a07c-80ca-a472-f7bd83033532", "name": "BADGER", "oracle": "", "mystical": "", "content": ""}];
