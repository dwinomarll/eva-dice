<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EVA ORACLE</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#d4af37;
  --gold-dim:rgba(212,175,55,0.45);
  --gold-faint:rgba(212,175,55,0.12);
  --bg:#07070f;
  --surface:rgba(255,255,255,0.03);
  --border:rgba(212,175,55,0.2);
  --text:#e8e0d0;
  --text-dim:rgba(232,224,208,0.5);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;overflow-x:hidden;}

/* TABS */
.tab-bar{
  display:flex;justify-content:center;gap:0;
  border-bottom:1px solid var(--border);
  padding:1rem 1rem 0;
  position:sticky;top:0;background:var(--bg);z-index:10;
}
.tab-btn{
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);padding:0.6rem 1.4rem;cursor:pointer;
  font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;
  transition:all 0.2s;white-space:nowrap;
}
.tab-btn:hover{color:var(--gold-dim);}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}

/* PANELS */
.panel{display:none;padding:1.5rem 1rem 3rem;max-width:760px;margin:0 auto;}
.panel.active{display:block;}

/* HEADER */
.oracle-title{
  text-align:center;font-size:0.6rem;letter-spacing:0.45em;
  color:var(--gold-dim);text-transform:uppercase;margin-bottom:0.3rem;margin-top:0.5rem;
}
.oracle-sub{
  text-align:center;font-size:0.55rem;letter-spacing:0.2em;
  color:var(--text-dim);text-transform:uppercase;margin-bottom:1.5rem;
}

/* BUTTON */
.oracle-btn{
  display:block;margin:0 auto 1.5rem;
  background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(130,80,200,0.15));
  border:1px solid rgba(212,175,55,0.6);color:var(--gold);
  padding:0.75rem 3rem;border-radius:999px;cursor:pointer;
  font-size:0.8rem;letter-spacing:0.2em;text-transform:uppercase;
  transition:all 0.2s;
}
.oracle-btn:hover{background:linear-gradient(135deg,rgba(212,175,55,0.25),rgba(130,80,200,0.25));box-shadow:0 0 20px rgba(212,175,55,0.2);}

/* CARD RESULT */
.result-area{margin-top:1rem;}
.card-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:1rem 1.2rem;margin-bottom:0.8rem;
  animation:fadeUp 0.4s ease-out both;
}
.card-pos{font-size:0.58rem;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:0.3rem;}
.card-name{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:0.2rem;}
.card-orient{
  display:inline-block;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
  padding:0.15rem 0.6rem;border-radius:999px;margin-bottom:0.5rem;
}
.upright{background:rgba(100,200,100,0.1);border:1px solid rgba(100,200,100,0.3);color:#7ec87e;}
.reversed{background:rgba(200,80,80,0.1);border:1px solid rgba(200,80,80,0.3);color:#e07070;}
.card-sage{font-size:0.82rem;line-height:1.6;color:var(--text-dim);}

/* MYSTIC */
.mystic-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:1.8rem;text-align:center;
  animation:fadeUp 0.5s ease-out both;
}
.mystic-name{font-size:2rem;font-weight:800;color:var(--gold);letter-spacing:0.12em;margin-bottom:0.3rem;}
.mystic-keyword{font-size:0.7rem;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:1.2rem;}
.mystic-desc{font-size:0.85rem;line-height:1.7;color:var(--text-dim);text-align:left;}
.shadow-label{font-size:0.65rem;letter-spacing:0.2em;color:rgba(200,80,80,0.7);text-transform:uppercase;margin:1rem 0 0.4rem;}

/* I CHING */
.hexagram-display{text-align:center;padding:1rem 0;}
.hex-lines{display:flex;flex-direction:column;gap:6px;align-items:center;margin:1rem auto;}
.hex-line{
  width:140px;height:8px;border-radius:2px;
  display:flex;gap:16px;align-items:center;justify-content:center;
}
.hex-line.yang{background:var(--gold);}
.hex-line.yin{background:transparent;}
.hex-line.yin::before,.hex-line.yin::after{
  content:"";display:block;width:58px;height:8px;
  background:var(--gold);border-radius:2px;
}
.hex-line.changing-yang{background:rgba(212,175,55,0.4);outline:1px dashed var(--gold);}
.hex-line.changing-yin{background:transparent;outline:none;}
.hex-line.changing-yin::before,.hex-line.changing-yin::after{
  content:"";display:block;width:58px;height:8px;
  background:rgba(212,175,55,0.4);border-radius:2px;outline:1px dashed var(--gold);
}
.hex-number{font-size:0.65rem;letter-spacing:0.2em;color:var(--gold-dim);margin-top:0.5rem;}
.hex-name{font-size:1.8rem;font-weight:800;color:var(--gold);margin:0.3rem 0;}
.hex-chinese{font-size:2rem;margin-bottom:0.5rem;}
.hex-keyword{font-size:0.7rem;letter-spacing:0.25em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:1rem;}
.hex-desc{font-size:0.85rem;line-height:1.7;color:var(--text-dim);text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-top:1rem;}
.changing-note{font-size:0.7rem;color:rgba(212,175,55,0.6);margin-top:0.8rem;text-align:center;letter-spacing:0.1em;}
.future-hex{margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1rem;}
.future-label{font-size:0.6rem;letter-spacing:0.25em;color:var(--text-dim);text-transform:uppercase;text-align:center;margin-bottom:0.5rem;}

/* DICE */
.dice-area{text-align:center;padding:1rem 0;}
.mode-row{display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem;}
.mode-btn{
  background:transparent;border:1px solid var(--border);color:var(--gold-dim);
  padding:0.35rem 1.25rem;border-radius:999px;cursor:pointer;
  font-size:0.75rem;letter-spacing:0.08em;transition:all 0.2s;
}
.mode-btn:hover{border-color:var(--gold-dim);color:var(--gold-dim);}
.mode-btn.active{background:rgba(212,175,55,0.18);border-color:var(--gold);color:var(--gold);}
.dice-visual{
  font-size:6rem;margin:1rem 0;display:block;
  animation:none;transition:transform 0.1s;
  cursor:pointer;user-select:none;
}
.dice-visual.rolling{animation:spin 0.5s ease-out;}
@keyframes spin{
  0%{transform:rotate(0deg) scale(1.2);}
  50%{transform:rotate(180deg) scale(0.8);}
  100%{transform:rotate(360deg) scale(1);}
}
.dice-result{font-size:4rem;font-weight:800;color:var(--gold);min-height:72px;display:flex;align-items:center;justify-content:center;text-shadow:0 0 24px rgba(212,175,55,0.6);}
.dice-label{font-size:0.7rem;letter-spacing:0.2em;color:var(--gold-dim);text-transform:uppercase;margin-top:0.3rem;}
.multi-results{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:0.5rem;}
.multi-die{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:0.6rem 1rem;text-align:center;
  animation:fadeUp 0.3s ease-out both;
}
.multi-die .num{font-size:1.6rem;font-weight:800;color:var(--gold);}
.multi-die .die-label{font-size:0.58rem;letter-spacing:0.1em;color:var(--text-dim);}

/* GLOBAL HEADER */
.page-header{
  text-align:center;padding:1.5rem 1rem 0.5rem;
  border-bottom:1px solid var(--border);
}
.page-header h1{
  font-size:0.75rem;letter-spacing:0.5em;text-transform:uppercase;
  color:var(--gold);font-weight:400;
}
.page-header p{font-size:0.55rem;letter-spacing:0.2em;color:var(--text-dim);margin-top:0.2rem;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.separator{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}
</style>
</head>
<body>

<div class="page-header">
  <h1>EVA Oracle</h1>
  <p>Celtic Cross · Wild Mystic · I Ching · Dice</p>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('tarot')">🃏 Tarot</button>
  <button class="tab-btn" onclick="switchTab('mystic')">🦅 Wild Mystic</button>
  <button class="tab-btn" onclick="switchTab('iching')">☯ I Ching</button>
  <button class="tab-btn" onclick="switchTab('dice')">🎲 Dice</button>
</div>

<!-- TAROT PANEL -->
<div id="panel-tarot" class="panel active">
  <div class="oracle-title">Tarot</div>
  <div class="oracle-sub">Choose your spread</div>
  <div class="mode-row" style="margin-bottom:1.2rem">
    <button class="mode-btn active" id="spread-celtic" onclick="setSpread('celtic')">Celtic Cross</button>
    <button class="mode-btn" id="spread-ppf" onclick="setSpread('ppf')">Past · Present · Future</button>
    <button class="mode-btn" id="spread-single" onclick="setSpread('single')">Single Draw</button>
  </div>
  <button class="oracle-btn" id="tarot-draw-btn" onclick="runTarotDraw()">✦ Draw The Cross ✦</button>
  <div id="tarot-result" class="result-area"></div>
</div>

<!-- WILD MYSTIC PANEL -->
<div id="panel-mystic" class="panel">
  <div class="oracle-title">Wild Mystic</div>
  <div class="oracle-sub">Your spirit guide speaks</div>
  <button class="oracle-btn" onclick="drawMystic()">✦ Call Your Guide ✦</button>
  <div id="mystic-result" class="result-area"></div>
</div>

<!-- I CHING PANEL -->
<div id="panel-iching" class="panel">
  <div class="oracle-title">I Ching</div>
  <div class="oracle-sub">Three coins · six throws · one truth</div>
  <button class="oracle-btn" onclick="castIChing()">✦ Cast The Coins ✦</button>
  <div id="iching-result" class="result-area"></div>
</div>

<!-- DICE PANEL -->
<div id="panel-dice" class="panel">
  <div class="oracle-title">Dice Roller</div>
  <div class="oracle-sub">The numbers speak</div>
  <div class="dice-area">
    <div class="mode-row" id="mode-row"></div>
    <div id="dice-visual" class="dice-visual" onclick="rollDice()">🎲</div>
    <div class="dice-result" id="dice-result">—</div>
    <div class="dice-label" id="dice-label">tap to roll</div>
    <div class="multi-results" id="multi-results"></div>
  </div>
  <div style="margin-top:1rem">
    <div class="mode-row" style="gap:0.5rem;justify-content:center;flex-wrap:wrap;">
      <span style="font-size:0.65rem;letter-spacing:0.15em;color:var(--text-dim);text-transform:uppercase;align-self:center;">Count:</span>
    </div>
    <div class="mode-row" id="count-row"></div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const TAROT_CARDS = [{"name": "Two Of Sword      ⚔️", "sage": "The \"Two of Swords\" card signifies a moment of difficult decision-making, often accompanied by confusion and the need for careful thought. The imagery of a blindfolded woman with crossed swords near the sea highlights the internal conflict and the balance between intellect and intuition.\n\nWhen drawn upright, this card suggests that you are about to face a significant choice, where opposing forces are at play. It encourages you to take your time, listen to your inner voice, and weigh your options carefully. In love, you may feel stuck or face unresolved issues; in career, you may need to choose between opportunities; and regarding finances, it's crucial to confront your spending habits to avoid deeper debts.\n\nWhen drawn reversed, the Two of Swords warns of deception and dishonesty surrounding you. You may feel pressured to make a decision against your wishes. In love, this card indicates a painful choice that needs to be made sooner rather than later. For career matters, it points to confusion between colleagues or decisions that seem overwhelming. In financial aspects, it highlights stress but reassures that time will help in sorting out your challenges.", "arcana": "Minor Arcana"}, {"name": "Two Of Pentacles   🪙", "sage": "The \"Two of Pentacles\" card signifies the need for balance and adaptability in your life, particularly in managing two key areas such as love and work or family and health. In a straight reading, it suggests you are juggling responsibilities but may not feel entirely stable. In love, it warns that overwhelming duties could hinder your romantic life; in your career, it indicates difficulty balancing multiple projects; and regarding finances, it hints at potential instability despite hard work.\n\nIn a reversed position, the card highlights chaos and lack of stability due to overwhelming tasks. It advises taking time off to reassess your priorities. In love, it suggests neglecting relationships due to a busy schedule; in career, it points to stress and the need for help; and in money matters, it warns of difficulties in saving, urging you to consider alternative income sources.", "arcana": "Minor Arcana"}, {"name": "TWO OF CUPS 🏆", "sage": "The \"TWO OF CUPS\" card signifies significant connections, whether in love, friendship, or work. In a straight reading, it indicates harmony and mutual respect in relationships, suggesting that everything is going smoothly. In love, it points to a fulfilling bond; in career contexts, it hints at beneficial partnerships. However, when reversed, it warns of potential separations and misunderstandings, with a call to address underlying issues. In love, it cautions against codependency; in career, it highlights discord among colleagues. Financially, it suggests instability and advises careful spending to avoid losses.", "arcana": "Minor Arcana"}, {"name": "TWO OF WANDS", "sage": "The \"Two of Wands\" card indicates a time of readiness and enthusiasm for new adventures, suggesting you have the world in your hands. In a love reading, it emphasizes the importance of open communication and mutual growth in relationships. Whether single or in a relationship, this phase encourages self-discovery and personal development. In career contexts, it signifies confidence and ownership of your career path, whereas in financial matters, it reflects stability and independence. However, if reversed, the card warns of a lack of goals and the need for patience and careful planning. Overall, this card signals a significant opportunity for growth and exploration in various aspects of life.", "arcana": "Minor Arcana"}, {"name": "THREE OF SWORDS", "sage": "The \"THREE OF SWORDS\" card represents significant emotional challenges, particularly around themes of pain, grief, and loss. In a reading, it signals experiences of betrayal and heartbreak, urging you to acknowledge these feelings as part of life’s impermanence.\n\n- In Love: Expect tears and significant issues affecting your happiness. Prioritize your well-being amidst difficulties.\n- In Career: Stress in the workplace could be impacting your mood, and there's a risk of job loss; however, resilience is key.\n- In Money: Recent financial losses are challenging your stability, so give yourself time to recover.\n\nIn its reversed position, the card indicates a transition from pain toward healing. You may be ready to forgive and move forward, whether still in a relationship or not.\n\n- In Love: Focus on healing past wounds and expressing your emotions.\n- In Career: You are working through stressful situations, though some negativity may linger from colleagues.\n- In Money: You're on the path to rebuilding financial stability, which requires patience and balance.", "arcana": "Minor Arcana"}, {"name": "THREE OF WANDS", "sage": "The Three of Wands signifies a time of expansion and exploration, suggesting that you are on the right path toward achieving your goals. In the upright position, it encourages you to embrace new opportunities and showcases your capabilities.\n\nIn terms of love, it is an ideal moment to deepen your commitment, whether by starting a new relationship or discussing future plans like marriage. For your career, you may find fruitful partnerships or enjoy the rewards of your efforts, with positive signs for business travel. Financially, it's a good time to invest in your projects, as your hard work will provide the stability needed to enjoy your gains.\n\nHowever, if the card is reversed, it indicates feelings of frustration despite your efforts. You may feel like you're not accomplishing everything you desire, but this doesn’t diminish the value of your work. In love, avoid applying pressure to your partner and focus on ensuring mutual commitment. Career-wise, some of your ideas may face rejection; perseverance is key. Financially, be vigilant in managing your income to avoid confusion or delays.", "arcana": "Minor Arcana"}, {"name": "KING OF SWORDS ⚔️", "sage": "The King of Swords symbolizes authority, responsibility, and clarity of thought. In this reading, the card suggests using logic and rationality to uncover the truth. It emphasizes the importance of mutual respect and intelligence in relationships, highlighting the value of maintaining high standards, especially if single. In career matters, it encourages pushing one’s abilities to succeed.\n\nHowever, when reversed, it warns against being overly authoritative and selfish, which can lead to negative consequences. In love, this may indicate manipulative behaviors or emotional turmoil. Professionally, it could reflect issues of aggression and disrespect, urging self-reflection. Financially, it cautions against careless spending and seeking quick fixes for financial mismanagement.", "arcana": "Mayor Arcana"}, {"name": "ACE Of PENTACLES   🪙", "sage": "The \"ACE Of PENTACLES\" symbolizes new opportunities in financial matters, reflecting wealth, prosperity, and stability. In a straightforward reading, it suggests the emergence of new financial possibilities, be it a project, business idea, or job. The advice is to focus on realistic goals and growth.\n\nIn love, this card indicates a relationship filled with abundance and loyalty; single individuals should prioritize practical aspects of life. For career readings, expect new proposals and choices, emphasizing careful decision-making.\n\nHowever, when reversed, it warns of potential overspending and financial instability, urging caution and the seeking of advice. In love, financial worries could strain relationships, while in career contexts, a lack of pride in work may suggest a need for strategic change or even a career shift. Financially, it highlights the importance of planning to avoid unexpected expenses.", "arcana": "Mayor Arcana"}, {"name": "ACE OF SWORD ⚔️", "sage": "The \"ACE OF SWORD\" ⚔️ symbolizes strength, power, and justice, representing a victory after a long battle characterized by honesty and fairness.\n\n### STRAIGHT\nIn a positive context, this card indicates clarity and a mindset focused on truth and justice, urging you to pursue your goals with integrity. In love, it encourages healthy communication, while in career, it suggests new opportunities. Financially, you may face important decisions that require rational thinking alongside emotional insight.\n\n### REVERSED\nConversely, when reversed, the card warns of destructive behaviors such as anger and manipulation stemming from past traumas. In love, it highlights the need for better communication to resolve conflicts. In a career context, it suggests potential disappointments and miscommunication, while financially, it indicates a lack of clarity in managing your finances.\n\nGiven the correlation with the past card \"COVER,\" it suggests that previous experiences may influence your current situation, emphasizing the importance of learning from past battles to navigate present challenges effectively.", "arcana": "Mayor Arcana"}, {"name": "Ten Of Pentacles 🪙", "sage": "The \"Ten of Pentacles\" signifies a culmination of wealth, stability, and familial harmony. In a straightforward reading, it indicates that your hard work will yield long-term security, allowing you to enjoy the fruits of your labor. This card suggests positive developments in love, career, and finances, emphasizing stable relationships, professional growth, and unexpected financial luck.\n\nHowever, if reversed, it warns of potential issues such as financial loss or familial conflicts that may threaten this stability. It advises caution in relationships and career choices, urging you to maintain boundaries and be prepared for challenges. Overall, this card's message is one of reassurance about your path toward lasting security and prosperity, while also reminding you to remain vigilant against unforeseen difficulties.", "arcana": "Minor Arcana"}, {"name": "Six Of Wands   🪄", "sage": "The \"Six of Wands\" card signifies victory, recognition, and celebration. In its upright position, it indicates success and fulfillment, especially in personal achievements, love, career, and finances. It suggests that you have been managing your skills effectively and are being acknowledged for your hard work. However, in reverse, it calls for a reevaluation of goals and encourages seeking support when feeling neglected or egotistical behaviors hinder progress. Overall, it emphasizes balance and the importance of being open to both success and constructive feedback.", "arcana": "Mayor Arcana"}, {"name": "PAGE OF PENTACLES 🪙", "sage": "The \"PAGE OF PENTACLES\" signifies a strong connection to your ambitions and material pursuits. In a reading influenced by this card, you are characterized by dedication and a grounded approach to your objectives.\n\nFor the straight position, you are brimming with energy, ready to embark on new endeavors, and possess an entrepreneurial spirit that drives you towards your goals. This card suggests that in love, you are ambitious and loyal, while in your career, you're adept at planning and building a solid foundation for your future. Financially, positive news is on the horizon, emphasizing the importance of careful planning and investment.\n\nIn the reversed position, there may be challenges in focusing on daily tasks, leading to feelings of laziness or low energy. In love, relationships may feel stagnant, requiring effort to rekindle passion. Career-wise, you might feel unprepared, and it’s essential to reassess your goals realistically while inviting spirituality into your journey. Financially, be cautious; bad news about potential losses or excessive spending may arise, signaling the need for better saving strategies and stability.", "arcana": "Minor Arcana"}, {"name": "KNIGHT of WANDS  🪄", "sage": "The \"Knight of Wands\" signifies movement and adventure, urging you to take trips and explore new places. It embodies enthusiasm for new projects, but also warns of unexpected changes. In love, it represents passion and impulsivity, while in career readings, it suggests travel opportunities but possible stagnation. Financially, expect unexpected gains, but be cautious with spending. Reversed, it indicates delays, unreliability, and potential loss of money, leading to frustration in relationships and career paths. Focus on maintaining motivation despite challenges.", "arcana": "Minor Arcana"}, {"name": "Three of Cups 🏆", "sage": "The \"Three of Cups\" card signifies celebration, joy, and strong connections with loved ones. In an upright position, it indicates a time of happiness in relationships, potentially marking special occasions like weddings or reunions. Career-wise, it suggests positive developments, such as promotions or successful collaborations. Financially, partnerships may lead to prosperity, but it's crucial to remain responsible with newfound wealth.\n\nConversely, when reversed, the card hints at possible struggles in relationships, imbalances in social life, or workplace challenges. It may also reflect financial worries due to recent expenditures. Overall, the card encourages maintaining balanced relationships and planning for the future.", "arcana": "Minor Arcana"}, {"name": "FOUR OF PENTACLES🪙", "sage": "The Four of Pentacles card suggests a focus on material security and attachment to possessions. In a reading, it indicates a strong desire to maintain what you have earned, which can be both positive and negative. While stability and savings for investments are beneficial, excessive attachment can lead to unhealthiness in relationships, career, and finances.\n\nIn love, it may signify a relationship plagued by jealousy and fear, or a tendency to cling to the past if single. In your career, it shows stability but warns against being overly protective due to fear of loss. Financially, it indicates good saving habits, but a reminder to balance responsibility with spending.\n\nReversed, this card highlights clinging to material possessions and resisting change, leading to stagnation and possible financial issues. In love, it suggests healing from past unhealthy patterns, while in career, it may reflect generosity or a risk of losing your position due to disinterest. Finally, in finances, it indicates either enjoying life with loved ones or potential overspending leading to problems.", "arcana": "Minor Arcana"}, {"name": "KING OF CUPS 🤴🏾", "sage": "The King of Cups represents emotional balance and kindness, highlighting your ability to harmonize feelings and logic. In a straight reading, it indicates that you are sensitive and creative, capable of navigating love and career with a calm mind. Be aware of maintaining financial stability through both intuition and reason.\n\nHowever, if drawn reversed, it warns of potential manipulation and emotional instability. In love, it suggests selfishness and a lack of commitment, while in career, it may reflect a difficult workplace environment. Financially, it cautions against emotional decision-making that could jeopardize security.\n\nOverall, the King of Cups encourages finding balance in emotions and responsibilities, urging you to nurture both your creative instincts and practical needs.", "arcana": ""}, {"name": "QUEEN Of PENTACLES 👸🏻", "sage": "The \"Queen of Pentacles\" represents a nurturing and resourceful figure, embodying both material success and emotional stability. In a reading, she suggests that you are focused on building a solid foundation in your relationships and career, encouraging independence and sound principles. When upright, she indicates that you can achieve financial success, supported by your skills and possibly a mentor.\n\nHowever, if reversed, the card warns of potential negativity, laziness, or jealousy. It suggests a need to address insecurities and unhealthy dynamics in relationships, as well as to refocus on inner growth rather than material attachments. Overall, the Queen of Pentacles emphasizes the balance between nurturing relationships and managing resources wisely.", "arcana": "Minor Arcana"}, {"name": "Nine Of Sword   🗡️", "sage": "The Nine of Swords card symbolizes despair and anxiety, depicting a woman waking from a nightmare, reflecting inner turmoil despite having protective swords on the wall.\n\nIn a straight reading, it indicates that something painful is haunting you, causing sleepless nights, possibly linked to unresolved trauma. In love, it suggests anxiety stemming from past relationships. In career readings, it points to workplace stress or paranoia, while in financial contexts, it highlights irrational fears about money.\n\nWhen reversed, the card retains its focus on trauma but introduces hope, suggesting that by confronting fears and engaging in open discussions, one can begin to heal and move forward in love, career, and finances.\n\nOverall, the Nine of Swords urges addressing deep-seated fears and seeking help where necessary for resolution and peace.", "arcana": "Mayor Arcana"}, {"name": "Seven Of Swords ⚔️", "sage": "The \"Seven Of Swords\" card suggests themes of dishonesty and betrayal, indicating that you or someone close may be trying to evade the consequences of their actions. In the context of your immediate future, be wary of deceit in relationships, workplaces, and financial dealings.\n\n- In Love: Lies may have been told, and it’s time to uncover the truth.\n- In Career: Watch for sneaky behavior from colleagues; consider refining your strategies.\n- In Money: Stay alert to potential scams or dishonest individuals trying to take advantage of you.\n\nWhen reversed, the card indicates a shift towards honesty after a period of lies, particularly highlighting the resolution of complicated situations and the necessity to confront financial truths.", "arcana": "Mayor Arcana"}, {"name": "EIGHT OF WANDS 🪄", "sage": "", "arcana": "Minor Arcana"}, {"name": "SIX OF CUPS 🏆", "sage": "The \"Six of Cups\" card signifies a warm, nostalgic energy that encourages you to embrace happy memories while welcoming new experiences. It highlights a moment of joy and connection, particularly between generations, suggesting that past experiences can enrich your present.\n\n### Straight Interpretation\nYou are entering a phase of happiness, with past memories bringing warmth to your heart. This might involve reconnecting with familiar places or people, and potentially finding love in the support of those around you.\n\n- In Love: Healing from past traumas and cherishing good memories.\n- In Career: Reflecting on past jobs as valuable lessons that can guide you forward.\n- In Money: Receiving support from family or friends, which strengthens your financial stability.\n\n### Reversed Interpretation\nThis card reversed indicates a struggle with instability and an unwillingness to release the past. While it’s important to remember your experiences, clinging to them may prevent you from embracing future opportunities.\n\n- In Love: It’s time for a more mature approach, letting go of old experiences to make space for new relationships.\n- In Career: Avoid returning to a previous job that no longer brings you joy; instead, focus on personal growth.\n- In Money: As your finances stabilize, seek greater independence and consider moving out to start anew.", "arcana": "Minor Arcana"}, {"name": "Three of Pentacles  🪙", "sage": "The \"Three of Pentacles\" card reflects themes of collaboration and teamwork. In a straight reading, it suggests that you are currently enjoying creative expression at work, receiving recognition for your talents. In love, it indicates a fulfilling partnership where both individuals inspire one another, possibly hinting at workplace romance. In career contexts, success is tied to teamwork and the contributions of others. However, in financial aspects, it points to a learning phase in managing finances.\n\nOn the other hand, if drawn reversed, it highlights challenges such as a lack of support from colleagues, leading to competition and disloyalty. In love, it suggests an imbalance where one partner carries the weight, causing tension. Career-wise, it points to disputes and miscommunication, which may hinder progress. Regarding finances, stress related to money management may lead to avoidance of financial responsibilities.", "arcana": "Minor Arcana"}, {"name": "KNIGHT OF SWORDS ⚔️", "sage": "The \"Knight of Swords\" symbolizes a young man who is confidently navigating through challenges, driven by intellectual energy represented by his white horse.\n\nWhen upright, this card indicates a strong passion for goals, but warns of the potential for negativity without compassion. In love, it suggests a struggle for emotional connection and the need for mental stimulation. In career matters, it reflects confidence and clarity about ambitions, while in financial matters, it emphasizes commitment and focus leading to stability.\n\nWhen reversed, it signifies a lack of control over emotions, impulsiveness, and disorganization. In love, it points to conflicts and dishonesty that may jeopardize relationships. In a career context, it warns against using arrogance to communicate, which can hurt others. Financially, it highlights an obsession with money that overshadows emotional well-being, calling for a necessary balance.", "arcana": "Mayor Arcana"}, {"name": "ACE OF CUPS  🏆", "sage": "The Ace of Cups card symbolizes emotional fulfillment, new beginnings, and spiritual regeneration. In a reading, its upright position indicates a time of joy and love, with new adventures or relationships on the horizon. Whether in love, career, or finances, this card suggests the flow of positive energy and support. However, when reversed, it warns of emotional struggles, blocked intuition, and potential negativity in relationships and career pursuits. It calls for self-reflection and nurturing self-love to navigate through challenges. Ultimately, the outcome of this reading emphasizes the importance of inner voice and creativity in transforming one's situation.", "arcana": "Mayor Arcana"}, {"name": "EIGHT OF SWORDS ⚔️", "sage": "The Eight of Swords represents feelings of entrapment and helplessness, often stemming from past choices and behaviors. In its upright position, it suggests that you may be stuck in a situation with no clear way out, emphasizing the need for logical assessment and personal responsibility. In love, it indicates feeling trapped in a relationship or being passive when single. In career readings, it points to dissatisfaction and the need for change, while in financial matters, it highlights anxiety but also the potential for improvement through action.\n\nWhen reversed, the card signifies awareness of past mistakes and readiness for change, suggesting personal growth. In love, it reflects a shift in needs and perspectives. Regarding career, it shows an increased awareness of skills and next steps, although it may also indicate a lack of hope. For financial matters, it suggests that fears may have lessened, and understanding the root of financial issues is key to resolving them.", "arcana": "Minor Arcana"}, {"name": "KING OF PENTACLES 🪙", "sage": "The King of Pentacles represents a figure of authority and abundance, symbolizing wealth and material success. In a straightforward reading, it signifies that you have built your success from the ground up or are on the verge of welcoming prosperity. This card embodies generosity, stability, and the ability to provide for others.\n\nIn love, it indicates a time of stability and commitment after hard work. For career readings, it assures success either through personal efforts or with the guidance of a mentor. Financially, it reflects a secure and stable situation, allowing you to share your resources with others.\n\nHowever, when reversed, the King of Pentacles warns of a focus solely on material possessions, potentially indicating selfishness or a lack of meaningful relationships. In love, it cautions against individuals who may use their wealth to control others. In career contexts, it may suggest discouragement or impending failure, while in finances, it alerts to potential losses or stinginess.", "arcana": "Mayor Arcana"}, {"name": "Nine Of Cups 🏆", "sage": "The \"Nine of Cups\" card symbolizes a period of contentment and achievement, indicating that after enduring struggles, you are now in a place to enjoy the fruits of your labor. This card signals good fortune, signifying that your dreams are coming true.\n\n- In Love: Celebrate your romantic life; you are ready to embrace a loving relationship.\n- In Career: Recognition is coming your way for your hard work; seize this opportunity to shine.\n- In Money: Abundance is on the horizon; enjoy the wealth that is flowing into your life.\n\nHowever, if drawn reversed, the card warns of unfulfilled desires, potential solitude, and disappointment. It suggests that your goals may need reassessment, and encourages gratitude for what you already have.\n\n- In Love (Reversed): While your relationship isn't in crisis, you might feel unfulfilled, indicating a need for inner work.\n- In Career (Reversed): You may be struggling to meet goals; consider revisiting your strategy.\n- In Money (Reversed): Financial habits might not yield desired results; stay positive and seek solutions.", "arcana": "Minor Arcana"}, {"name": "Nine of Pentacles  🪙", "sage": "The \"Nine of Pentacles\" card symbolizes fulfillment and achievement. In its upright position, it represents a mature, wealthy woman who embodies the rewards of hard work, commitment, and skill. You are encouraged to enjoy your accomplishments and take pride in what you’ve built.\n\nIn a love reading, this card suggests a sense of contentment that makes you attractive to others, whether single or in a relationship. In career contexts, it denotes prosperity and abundance from your job or business endeavors. Financially, it indicates stability and readiness for investments.\n\nHowever, in its reversed position, the card warns of potential financial loss or dependence on others, advising a step back to reassess your situation. In love, it highlights insecurities that need addressing. Career-wise, it suggests a lack of gains despite hard work or a desire for success without effort, cautioning against dishonest colleagues. Financially, it serves as a warning against irresponsible spending that could lead to bankruptcy.", "arcana": "Minor Arcana"}, {"name": "Ten Of Swords  ⚔️", "sage": "The \"Ten of Swords\" card represents a significant low point in life, characterized by betrayal and suffering. The imagery of a dead man stabbed by ten swords conveys deep emotional pain, suggesting that the source of distress is internal rather than external. Despite the overwhelming negativity, the rising sun in the background symbolizes hope for a new beginning.\n\nIn a love reading, this card often indicates the end of a relationship, possibly due to betrayal. For career-related inquiries, it suggests a stressful work environment, hinting at the potential end of a job but also an opportunity for growth. In financial matters, it warns of unprofitable investments and the need for savings.\n\nWhen reversed, the card still reflects sorrow, but with a sense of awareness that the worst is behind. In love, it signifies healing from past traumas. In career contexts, it indicates a gradual escape from stress, while in finances, it suggests recovery from a near-bankruptcy situation, serving as a vital lesson for the future.", "arcana": "Mayor Arcana"}, {"name": "PAGE OF SWORDS ⚔️", "sage": "The \"PAGE OF SWORDS\" indicates a dynamic energy surrounding the young man depicted, symbolizing curiosity and passion. In a straight reading, this card reflects a positive, energetic attitude towards learning and personal dreams. It encourages open communication and seeking advice. However, in love, it warns of potential misunderstandings and the need for emotional sensitivity. In career matters, it highlights motivation but emphasizes the importance of dedication for progress. Financially, it suggests a need for mentorship in managing ideas effectively.\n\nIn a reversed position, the traits of the card shift to negativity. The drive for success may lead to harmful behaviors and miscommunication, particularly in relationships where empathy is crucial. Career-wise, it indicates a lack of focus, hindering progress, while in finances, it points to excessive planning without execution, urging a more practical approach.", "arcana": "Minor Arcana"}, {"name": "Six Of Swords ⚔️", "sage": "The \"Six of Swords\" card signifies a significant transition, often involving leaving behind something painful or difficult. In the context of your reading, it suggests that you are currently navigating a challenging change that may bring feelings of sadness or grief. However, this transition is essential for your growth.\n\n- In Love: This card may indicate the end of a relationship or the closure of a painful chapter, paving the way for new love after a period of heartache.\n\n- In Career: Recent changes in your work life allow you to shed stress, enabling you to embrace a more relaxed and beneficial phase.\n\n- In Money: You are in a position to leave past financial struggles behind, but it's crucial to stay vigilant and address any emerging issues to avoid future complications.\n\nIn its reversed position, the card suggests difficulty in moving on from past experiences. You might be clinging to situations or relationships that no longer serve you, leading to insecurity and instability. It's a call to examine your circumstances and consider necessary changes.\n\n- In Love (Reversed): You're holding onto past hurts that undermine your current relationship. If involved with a toxic partner, moving on is advised.\n\n- In Career (Reversed): You may be facing persistent stress at work. Reflect on your approach and consider whether defensiveness could be contributing to ongoing troubles.\n\n- In Money (Reversed): Ignoring financial issues will only exacerbate them. It's time to confront and resolve these challenges to secure a healthier financial future.", "arcana": "Minor Arcana"}, {"name": "Ten Of Cups  🏆", "sage": "The \"Ten of Cups\" represents ultimate happiness and fulfillment in various aspects of life. In a reading, it signifies joy in personal achievements, harmonious relationships with family and friends, and a sense of gratitude for what one has.\n\nIn love, it suggests a supportive environment filled with love; for singles, it indicates the potential for a lasting relationship. In career, it points to professional growth within a positive work atmosphere, allowing time for personal connections. Financially, this card is a sign of incoming abundance and contentment.\n\nConversely, when reversed, it highlights family issues causing stress and disappointment, urging a choice for love to restore harmony. It reflects potential relationship strains due to family dynamics and an uncomfortable work environment that may lead to overworking and dissatisfaction. Financial instability might also be a concern, requiring emotional balance to address stressors.\n\nOverall, the readings emphasize the interconnectedness of love, family, career, and finances. It calls for balance, harmony, and resolution of underlying issues to achieve stability and fulfillment.", "arcana": "Mayor Arcana"}, {"name": "Seven Of Wands  🪄", "sage": "The Seven of Wands signifies the challenges we face in life, highlighting the importance of self-defense and perseverance. In a reading about love, it encourages you to address relationship issues while respecting boundaries. For career readings, it emphasizes the need to maintain focus on your goals despite distractions. Regarding finances, it warns of jealousy and disputes, urging you to reinforce your financial stability. In reverse, the card indicates confusion and indecision, suggesting a need for healing and open communication in relationships, vigilance against jealousy in the workplace, and caution against unnecessary spending.", "arcana": "Minor Arcana"}, {"name": "Nine Of Wands  🪄", "sage": "The \"Nine of Wands\" card signifies resilience and perseverance in the face of adversity. It suggests that while challenges and possible betrayal may arise, you possess the strength and willpower to overcome these obstacles. In love, it indicates the potential to resolve past issues and move forward with your partner. In career readings, it reflects ongoing struggles but reassures you that you are halfway to achieving success. Financially, caution is advised against dipping into savings, as stability is not guaranteed.\n\nWhen reversed, the card warns of stress stemming from avoidance and low confidence. It highlights unresolved issues in relationships, suggesting the need for compromise or reevaluation. In career contexts, it may signal a necessary change in direction, especially if you feel drained. Financially, it calls for greater awareness and responsibility to avoid worsening your situation.", "arcana": "Minor Arcana"}, {"name": "QUEEN OF CUPS 👑", "sage": "The \"QUEEN OF CUPS\" card represents a figure embodying emotional beauty and intuition. It signifies a compassionate and kind person capable of understanding others' feelings.\n\nIn a straight position, this card highlights your nurturing nature and ability to support those around you, particularly in love and career. It warns to be cautious about energy-draining relationships and emphasizes the importance of spiritual fulfillment over monetary gain.\n\nWhen reversed, it indicates emotional instability and hypersensitivity, leading to confusion and stress in relationships and career. It suggests the need to reassess what truly brings happiness and to focus on saving rather than impulsive spending.\n\nOverall, this card encourages a balanced approach to emotions and relationships, urging you to cultivate inner peace and self-awareness.", "arcana": "Mayor Arcana"}, {"name": "Ten of Wands   🪄", "sage": "The \"Ten of Wands\" represents a heavy burden and the struggle that comes with carrying too many responsibilities. In a straightforward interpretation, it signifies the exhaustion and burnout that can arise from overloading oneself with duties. It encourages better energy management to achieve goals rather than giving up.\n\nIn love readings, it suggests that external pressures are impacting romantic focus, advising open communication with your partner. In career contexts, it highlights overwhelming responsibilities, urging you to seek help or take time off. For financial matters, it indicates a significant burden that may require professional advice if solutions are elusive.\n\nWhen reversed, the card indicates the need to release unnecessary stress, particularly from others’ problems. In love, it suggests that partners should communicate their issues openly. In careers, it signifies a time to rest and prioritize self-care. Regarding finances, it could mean liberation from previous financial troubles or a warning about neglecting them, which may lead to losses.", "arcana": "Minor Arcana"}, {"name": "Seven of Cups 🏆", "sage": "The \"Seven of Cups\" card symbolizes a moment of choice and potential confusion, where imagination meets reality. In its upright position, it suggests you may face multiple options, urging you to act concretely rather than get lost in dreams. In love, be wary of temptations; in career, maintain confidence while analyzing consequences; and in finances, stay alert to avoid illusions.\n\nReversed, the card indicates a detachment from reality, highlighting the dangers of excessive dreaming. In love, a lack of clarity might hinder important decisions; in career, you may feel stagnation, prompting a need to set new goals; and in finances, it calls for realistic approaches to improvement while facing any avoidance of reality.", "arcana": "Minor Arcana"}, {"name": "QUEEN OF WANDS 👸🏻", "sage": "The Queen of Wands represents an authoritative figure who embodies confidence and strength. She is depicted holding a sunflower, symbolizing fertility and happiness, while her wand signifies life. This card embodies warmth, vibrant personalities, and fidelity. However, when reversed, it can indicate jealousy and greed.\n\nIn a straightforward reading, the Queen of Wands suggests a person who is loving, loyal, respectful, and caring, balancing determination and leadership.\n\n- In Love: This card signifies a harmonious blend of passion and commitment, fostering open and trustworthy relationships.\n- In Career: You possess the skills and energy needed to complete projects successfully, leading to fulfillment and new opportunities.\n- In Money: You can increase your finances by pursuing your passions, encouraging you to think bigger and make strategic moves.\n\nWhen reversed, the Queen of Wands may bring drama stemming from jealousy and manipulation.\n\n- In Love: There may be aggressive emotions and a lack of care, necessitating introspection and understanding of needs.\n- In Career: A lack of enthusiasm and initiative can lead to feelings of disconnection; consider changing your mindset or job for greater happiness.\n- In Money: Exercise caution with spending and think carefully before making significant financial decisions.", "arcana": "Mayor Arcana"}, {"name": "Seven of Pentacles 🪙", "sage": "The \"Seven of Pentacles\" card reflects a period of reflection on hard work and progress, indicating that results are beginning to materialize from past efforts. In a love reading, it suggests a slow development of a romantic relationship, possibly stemming from a friendship, emphasizing the need for patience. In career contexts, it points to steady progress, urging one to identify areas for improvement. Financially, it indicates the enjoyment of rewards from diligence, but caution is needed regarding potential setbacks if the card appears reversed, signaling disappointment and a need for new strategies. Whether upright or reversed, this card calls for a balanced approach and reassessment of goals to ensure future success.", "arcana": "Minor Arcana"}, {"name": "FIVE OF CUPS 🏆", "sage": "The \"Five of Cups\" is a card that embodies despair and sadness, often reflecting a focus on loss rather than the opportunities still available. In a reading about love, it suggests you're navigating a difficult breakup but encourages you to look forward to new possibilities. In career readings, it indicates loss but emphasizes the importance of maintaining a positive outlook during transformative times. Regarding finances, it warns of potential losses and advises caution with investments. Reversed, this card signifies acceptance of past pain and a willingness to move forward, with a focus on recovery and gratitude for future gains.", "arcana": "Minor Arcana"}, {"name": "Six Of Pentacles   🪙", "sage": "The \"Six of Pentacles\" card signifies a balanced relationship with wealth and generosity. When drawn upright, it indicates financial stability and a willingness to help others, suggesting that you may receive charity or assistance in return. In love, it reflects a supportive partner; in career, it points to a well-paying job with potential mentorship; and in finances, it highlights a positive opportunity to work on personal projects.\n\nHowever, if reversed, the card warns of instability regarding money, possibly indicating unreciprocated generosity, debts, or greed. In love, it may reveal an imbalance where one partner gives while the other only receives. In career contexts, it suggests someone may be exploiting your position, while in financial matters, it could mean the absence of expected support or being taken advantage of.", "arcana": "Mayor Arcana"}, {"name": "Four Of Sword    🗡️", "sage": "The \"Four of Swords\" card suggests a need for retreat and self-care. With the knight lying in the tomb, it symbolizes the end of a battle, urging you to take a break for mental and emotional recharge.\n\nIn a Reading About Love: If you're single, consider stepping back from dating to rejuvenate. In a relationship, it's an ideal time for a getaway with your partner.\n\nIn a Reading About Career: The card indicates that work has been overwhelming, advising you to prioritize your well-being.\n\nIn a Reading About Money: It encourages a break from financial worries, suggesting you spend time away from money concerns.\n\nReversed Meaning: If you find it hard to take a break, recognize the importance of rest.\n\nIn a Reading About Love: Instead of distancing from your partner, focus on enjoying quality time together.\n\nIn a Reading About Career: A reminder to listen to your needs and rest when necessary.\n\nIn a Reading About Money: If managing finances feels overwhelming, consider seeking professional help.", "arcana": "Minor Arcana"}, {"name": "PAGE of WANDS  🪄", "sage": "The Page of Wands represents youthful enthusiasm and a desire for new experiences. This card signifies excitement and curiosity, indicating a drive for success but also potential challenges due to inexperience.\n\nIn an upright position, it encourages setting realistic goals and developing new skills to avoid stagnation in career and finances. In love, it suggests an optimistic view and openness to new relationships.\n\nHowever, when reversed, it signals disappointment and a struggle to realize ideas. It warns of childish behavior in relationships and a feeling of being stuck in career pursuits. Financially, it indicates instability, often due to impulsive spending.\n\nOverall, the Page of Wands encourages embracing new beginnings while being mindful of the challenges that come with them.", "arcana": "Minor Arcana"}, {"name": "ACE of WANDS  🪄", "sage": "The ACE of WANDS signifies a powerful opportunity for reinvention and creativity, encouraging you to embark on new projects and chapters in your life. In a love reading, it suggests loyalty and potential new romantic connections, while in a career context, it points to professional growth fueled by creativity. Financially, improvements and unexpected gains are on the horizon, but caution is advised against large expenditures.\n\nConversely, when reversed, the card indicates delays in projects and potential disorientation. While you may feel unmotivated, it’s crucial to reassess your goals to regain your vitality. In love, relationships may not endure, highlighting the need for better communication. Professionally, enthusiasm may face challenges, and financially, it’s a time to save rather than spend, as a decrease in funds may be forthcoming.", "arcana": "Mayor Arcana"}, {"name": "Eight Of Pentacles 🪙", "sage": "The Eight of Pentacles symbolizes a period of focused dedication and hard work. In the upright position, it emphasizes the importance of commitment to your goals, suggesting that your efforts in love, career, and finances are likely to yield positive results. In love, it indicates a stable relationship that requires nurturing, while in career, it points to the potential for promotion due to your dedication. Financially, it reflects an increase in income linked to your hard work.\n\nHowever, when reversed, this card warns of burnout and stress from overexertion. It suggests that while you may feel unfulfilled in your job or relationship, you might lack the motivation to make necessary changes. In finances, it highlights avoidance of financial management, which could jeopardize your stability. The key takeaway is to maintain balance and use your skills responsibly to improve your circumstances.", "arcana": "Minor Arcana"}, {"name": "FIVE OF PENTACLES  🪙", "sage": "The Five of Pentacles symbolizes adversity and hardship. The imagery depicts two impoverished individuals struggling against the cold, highlighting themes of financial instability and emotional distress.\n\nStraight Reading: This card indicates a pressing need for assistance—financially or health-wise. In love, it suggests feelings of isolation and the impact of financial woes on relationships. In your career, it reflects disconnection from colleagues and potential job instability. Be open to asking for help in your financial matters.\n\nReversed Reading: This card suggests recovery from a difficult period, with support from loved ones leading to newfound stability. In love, healing is on the horizon, restoring the capacity to connect. Career-wise, solutions are emerging, and patience is key. Financially, you're on the path to resolution, balancing debts and discovering new income sources.", "arcana": "Minor Arcana"}, {"name": "PAGE OF CUPS 🏆", "sage": "The \"PAGE OF CUPS\" suggests a journey of emotional exploration and creativity. The presence of a fish emerging from the cup symbolizes unexpected inspiration and messages from the unconscious. You are encouraged to embrace a wave of creativity, express your ideas, and engage in artistic pursuits.\n\nIn love readings, you may experience a renewed perspective on your partner or find a romantic connection if single. Career-wise, you excel in creative fields but need to ground your emotions. Financially, be cautious of unrealistic goals and aim for gradual growth.\n\nHowever, if reversed, you might face emotional blockages and a struggle with expressing yourself. This could manifest in insecurities in love, difficulties in career, and allowing emotions to impact your financial decisions. It's vital to confront these issues instead of avoiding them to find balance and progress.", "arcana": "Minor Arcana"}, {"name": "KNIGHT Of PENTACLES  🪙", "sage": "The Knight of Pentacles symbolizes a methodical and responsible approach to life. With a focus on a single coin, this card emphasizes careful planning and a commitment to duties. In a straight reading, it indicates reliability and clear goals, suggesting stability in love, career, and finances. However, in a reversed position, it warns of boredom and lack of motivation, encouraging a shift towards spirituality and balance in spending and saving. Overall, this card urges you to remain diligent and thoughtful as you navigate your responsibilities and aspirations.", "arcana": "Mayor Arcana"}, {"name": "EIGHT OF CUPS🏆", "sage": "The \"Eight of Cups\" card signifies a journey of transformation and transition, urging you to leave behind what no longer serves you. In your current situation, you may feel dissatisfied with your routine and are seeking new adventures.\n\nIn a Love Reading: Reflect on your willingness to commit. Are you ready to embrace a relationship, or are you simply afraid of solitude?\n\nIn a Career Reading: Consider taking a break to rejuvenate. A short holiday or even a brief walk can provide the clarity you need.\n\nIn a Money Reading: It's essential to assess your finances objectively. Take the time to understand what changes you need to make for improvement and plan for the future.\n\nIn the reversed position, the card highlights an internal conflict. You desire new beginnings but fear leaving behind the old.\n\nIn a Love Reading: You may feel the urge to be independent yet hesitate to leave your current relationship. Understanding your feelings is key.\n\nIn a Career Reading: While you long for freedom from your job, fear of consequences holds you back. Change is often necessary to rediscover joy.\n\nIn a Money Reading: You might be reluctant to let go of familiar income sources for new opportunities, but this transformation can lead to better outcomes over time.", "arcana": "Mayor Arcana"}, {"name": "FIVE OF WANDS  🪄", "sage": "The \"Five of Wands\" card represents a dynamic of competition and ambition, suggesting the presence of conflict that may resurface or emerge in various aspects of life. In love, differing opinions can lead to arguments; in career, competition among colleagues may require you to showcase your skills; and regarding finances, patience is essential as tensions may arise. The reversed position indicates avoidance of issues, leading to increased stress, particularly in love, career, and financial matters. Open communication and empathy are crucial for resolution.", "arcana": "Minor Arcana"}, {"name": "Four Of Cups 🏆", "sage": "The \"Four of Cups\" suggests a period of introspection and stagnation. The imagery of a young man meditating under a tree indicates a need for self-reflection and awareness. This card highlights that one may overlook the opportunities and blessings that are present, urging a deeper connection with one's inner self to reignite creativity and motivation.\n\nIn a love reading, it points to a disinterest in romance, possibly due to emotional protection or readiness issues. In career, it signifies boredom and a lack of progress, prompting the need to identify steps toward greater fulfillment. Regarding finances, it suggests a disconnect that could be improved through gratitude and awareness.\n\nWhen reversed, the card presents a more positive outlook, indicating a newfound awareness and readiness to embrace opportunities. In love, it reflects healing from past pains and openness to future possibilities. In career, it signals a resurgence of motivation and creativity, essential for achieving goals. For finances, it suggests recovery and a return to stability, encouraging focus on the path ahead.", "arcana": "Minor Arcana"}, {"name": "THE HANGED MAN 🪢", "sage": "The Hanged Man card signifies a time of reflection and sacrifice, urging you to see things from a different perspective. In its upright position, it suggests a necessary pause for personal insight and calm, especially in love, career, and finances. You may need to wait for the right moment in love or reconsider your career path without rushing. However, in its reversed position, it warns against sacrificing your needs for the approval of others, leading to stagnation and unfulfillment. It's essential to take control of your decisions and release past attachments to avoid losses, particularly in financial matters. Embrace the opportunity for personal growth and change.", "arcana": "Mayor Arcana"}, {"name": "THE HERMIT 🪔", "sage": "The Hermit card represents a journey of solitude and inner guidance. When drawn upright, it signifies a readiness to embrace spiritual insight, leading to greater self-awareness and balance. In love, it suggests the need for independence and self-reflection, while in career, it indicates a desire for personal fulfillment. Financially, it encourages a grounded approach and seeking advice.\n\nReversed, The Hermit warns against excessive isolation and urges finding balance between introspection and social interaction. In love, it highlights disconnection that can be resolved through self-awareness. For career, it may signal prolonged solitude or a readiness to reconnect with others. Financially, it stresses the importance of being open to external guidance to improve one’s situation.", "arcana": "Mayor Arcana"}, {"name": "THE MAGICIAN  🧙🏾‍♀️", "sage": "The Magician card symbolizes manifestation and willpower in its upright position, suggesting that you harness the connection between the spiritual and material worlds. It encourages you to act now, make important decisions, and utilize your inner power to create the life you desire. In love, it signifies excitement and inspiration, while in career, it indicates the drive to succeed and the potential for new opportunities. However, when reversed, it warns of disconnection, anxiety, and the presence of deception. This could affect your relationships and career, urging you to recognize your full potential and be cautious of those who may not have your best interests at heart.", "arcana": "Mayor Arcana"}, {"name": "THE WORLD    🌎", "sage": "The Tarot card \"The World\" symbolizes completion and fulfillment, indicating great success in various aspects of life such as love, career, and finances. When drawn upright, it suggests a sense of wholeness and achievement, encouraging you to embrace the rewards of your hard work and share your accomplishments with others. In love, it signifies mature relationships or readiness for a stable partnership. In career, it highlights the completion of projects and recognition of efforts. Conversely, when reversed, it reflects feelings of confusion and discontent, suggesting that while some goals may have been achieved, they do not align with your true desires. It prompts introspection to determine what changes are needed to find fulfillment.", "arcana": "Mayor Arcana"}, {"name": "The HiGH PRIESTESS🧝🏻‍♀️", "sage": "The High Priestess card suggests a focus on intuition and inner voice, encouraging introspection and calmness. In a love reading, it indicates deep romantic feelings beneath calm emotions, while in a career context, it advises relying on instincts and considering further education. Reversed, the card warns of disconnection from one's intuition, signaling a need for spiritual exploration and honesty in relationships. The Celtic Cross tarot spread, known for its depth, can provide insights into various aspects of life, revealing patterns and potential outcomes based on the current situation and challenges faced.", "arcana": "Mayor Arcana"}, {"name": "THE   E M P R E S S 👸🏻", "sage": "The Empress card, representing fertility and feminine power, suggests a strong emphasis on nurturing and creativity in your life. If drawn upright, it signals a time of abundance, harmony, and the birth of new ideas, especially in relationships, career, and financial matters. Positive developments, such as a loving partnership or workplace satisfaction, are indicated.\n\nHowever, if drawn reversed, it warns against neglecting self-care and overextending yourself for others. You may need to reassess your self-worth and balance in relationships, career, and finances, as feelings of exhaustion or disconnect could arise. This card encourages you to find inner strength and stability to enhance your overall well-being.", "arcana": "Mayor Arcana"}, {"name": "THE DEVIL         😈", "sage": "The Tarot card \"The Devil\" symbolizes materialism and indulgence when drawn straight, indicating a dependence on material pleasures that may lead to long-term unhappiness. In love, it warns against selfish behaviors or addiction to a relationship. In career, it suggests being stuck in an unsatisfactory job, while in finances, it prompts reflection on one's attraction to money.\n\nWhen reversed, the card signifies feeling trapped and urges inner work to overcome addictions. In love, it encourages leaving unhealthy relationships, while in career, it advocates planning changes. Financially, it points to working through past mistakes for stability.\n\nUltimately, pleasure can ignite the spark of life, but it's essential to balance it with self-awareness and personal growth.", "arcana": "Mayor Arcana"}, {"name": "THE EMPEROR   👨‍🎓", "sage": "The Emperor card symbolizes authority and control, representing a strong paternal figure associated with order and strategic thinking. In a reading, its upright position suggests the need to make important decisions, indicating stability, maturity, and a focus on material matters, especially in career and finances. Conversely, when reversed, it reflects immaturity and potential conflicts with authority, warning against a lack of self-control and responsibility. This duality affects love, career, and financial aspects, guiding individuals to either embrace leadership or confront their challenges.", "arcana": "Mayor Arcana"}, {"name": "T H E   F O O L 🃏", "sage": "The Fool card represents a journey of new beginnings and freedom. In a reading, this card signifies readiness to embark on a new chapter in life, encouraging openness to experiences and a childlike wonder.\n\nWhen drawn upright, it suggests embracing faith, spontaneity, and positivity in love, career, and finances. It's a sign to be adventurous and take risks, especially regarding new relationships, job changes, or business opportunities.\n\nReversed, The Fool indicates inconsistency, immaturity, or a lack of awareness of consequences. It warns against rash decisions in love, career stagnation, or financial carelessness, urging careful consideration before acting.\n\nOverall, The Fool encourages lightness and spontaneity, reminding us to embrace the journey without being overly concerned about controlling outcomes.", "arcana": "Mayor Arcana"}, {"name": "THE CHARIOT 💺", "sage": "The Chariot represents a journey of willpower and determination, symbolizing a man ready to leave his past behind and embark on a new adventure. Key symbols include the two sphinxes representing opposing forces that must be controlled for progress. In a love reading, it suggests focusing on personal needs to improve relationships. In career and money contexts, it encourages confidence and avoiding distractions, while the reversed position indicates stress and a lack of control, urging the querent to seek balance and clarity. The Celtic Cross tarot spread offers a detailed examination of the querent's life, with each card revealing insights into their current situation, challenges, and potential outcomes. Trust your intuition as you interpret these cards, as they are a powerful tool for self-discovery.", "arcana": "Mayor Arcana"}, {"name": "STRENGTH    🦁", "sage": "The \"STRENGTH\" card indicates a powerful inner resilience and compassion. In its upright position, it signifies the ability to remain calm and focused during challenges, with a strong heart filled with empathy. It suggests potential for stable relationships and successful career ventures, emphasizing the need for balance between rational thought and intuition.\n\nHowever, in the reversed position, the card warns of inner conflict, anger, and impulsive behavior. It indicates a struggle with self-identity and a fear of vulnerability in relationships. The advice is to reconnect with one's true self, express feelings openly, and regain confidence to achieve fulfillment in love, career, and finances.", "arcana": "Mayor Arcana"}, {"name": "DEATH   💀", "sage": "The Tarot card \"Death\" symbolizes transformation and significant changes in your life. In a reading related to love, it indicates the need to address damaging patterns in your relationship, suggesting a possible end to a difficult phase and the importance of improved communication. In a career context, it highlights your attachment to stability despite dissatisfaction, urging you to embrace necessary changes. Financially, it points to challenges but emphasizes that past mistakes can lead to valuable lessons for improvement.\n\nWhen reversed, the card signifies resistance to change, leading to stagnation. In love, it warns against clinging to relationships that no longer serve you, while in career readings, it reflects unhealthy choices and self-sabotage. Financially, it indicates unsustainable habits due to fear of change, urging you to reassess your spending patterns and embrace transformation for a healthier future.", "arcana": "Mayor Arcana"}, {"name": "THE STAR  ⭐️", "sage": "The Star card represents hope, good fortune, and spiritual connection, symbolizing a fresh start and emotional healing. In a reading, it encourages you to embrace positivity and pursue your dreams, while reminding you to maintain faith in the universe. When reversed, it warns of discouragement and a lack of faith, urging you to keep hope alive and recognize your worth. This card highlights balance and harmony, suggesting that despite challenges, there is light and inspiration ahead. It serves as a powerful reminder to trust your intuition and stay true to your path.", "arcana": "Mayor Arcana"}, {"name": "THE TOWER      🗼", "sage": "The Tower card signifies major upheaval and transformation, suggesting that you may be facing significant changes that are necessary but challenging. In a love reading, it indicates a need for serious reflection on your relationship, possibly hinting at a breakup. In career contexts, it suggests unexpected developments at work that could necessitate a job change for stability. Regarding finances, you might encounter unforeseen difficulties, emphasizing the importance of saving. Reversed, the card highlights resistance to necessary changes, urging you to confront reality and acknowledge problems before they escalate. Embrace change to attain freedom and relief from burdens.", "arcana": "Mayor Arcana"}, {"name": "WHEEL OF FORTUNE ⚙️", "sage": "The \"Wheel of Fortune\" card indicates significant changes in various aspects of life. When drawn upright, it signifies good luck and positive transformation, suggesting that both love and career opportunities are on the horizon. Embrace these changes, as they promise growth and happiness. However, in a reversed position, it warns against avoiding necessary changes due to fear, leading to misunderstandings in relationships and instability in finances. It's crucial to confront reality and release what no longer serves you to restore balance.", "arcana": "Mayor Arcana"}, {"name": "TEMPERANCE", "sage": "The Tarot card \"TEMPERANCE\" symbolizes moderation and balance. In a reading, it suggests a calm and patient mindset, protecting you from external anxieties. In love, it advises allowing your relationship to evolve naturally, avoiding ego-driven behaviors. In career, it indicates a harmonious workplace where efforts will be rewarded. Regarding finances, while income may be slow, your moderation ensures stability.\n\nHowever, when reversed, \"TEMPERANCE\" warns of a lack of control, potential addictions, and imbalance in life due to poor planning. In love, rushing situations can lead to problems, and in career, you may struggle with work-life balance. Financially, a lack of confidence could hinder your enjoyment of money.", "arcana": "Mayor Arcana"}, {"name": "JUDGEMENT     ⚖️", "sage": "The \"Judgement\" card signifies a time for reflection and self-awareness, urging you to confront past actions and embrace necessary changes. In a love reading, it encourages open communication with your partner about needed adjustments. For career insights, it suggests considering a job change that aligns with your true self. In terms of finances, it prompts you to reassess your money management practices. When reversed, the card warns against avoiding self-confrontation and highlights the need to let go of past mistakes. It calls for openness to change in love, career, and financial matters to improve your overall situation.", "arcana": "Mayor Arcana"}, {"name": "THE MOON      🌕", "sage": "The Moon card, symbolizing intuition and illusions when upright, suggests a connection to your inner voice and creativity. It encourages you to trust your instincts during uncertain times, especially in love, career, and financial matters. However, when reversed, it indicates fear and doubt, urging you to confront past issues and navigate through confusion in relationships and work. Pay attention to your feelings and the signs around you to uncover hidden truths and achieve clarity.", "arcana": "Mayor Arcana"}, {"name": "THE LOVERS ♥️", "sage": "The Lovers card represents the union of opposites and partnership when upright, indicating harmony in relationships and significant choices. It symbolizes communication, especially in love and career contexts, suggesting mutual respect and potential decisions affecting financial stability. Reversed, it reflects disconnection and conflict, emphasizing the need for improved communication and responsibility. In both positions, the card highlights the importance of aligning beliefs with actions, whether in love, career, or financial matters.", "arcana": "Mayor Arcana"}, {"name": "THE  SUN        ☀️", "sage": "The Sun card indicates a time of success, happiness, and abundance. If drawn upright, it signifies that you are in charge of your life, ready to welcome positive outcomes in love, career, and finances. In love, it suggests a happy relationship or a perfect time to find romance. In your career, recognition and fulfillment await you. Regarding finances, stability and happiness are highlighted.\n\nHowever, if the card is reversed, it may signal slower progress or feelings of unworthiness. It invites introspection to identify what might be blocking your happiness. In love, it could suggest taking your partner for granted or feeling disconnected. In career readings, it warns against feeling overwhelmed or burned out. For finances, it advises tempering confidence to avoid arrogance and approaching issues with logic.", "arcana": "Mayor Arcana"}, {"name": "THE HIEROPHANT  ⛪", "sage": "The Hierophant card signifies spiritual authority and conformity, suggesting a focus on tradition and established beliefs. In its upright position, it indicates a need for guidance from a mentor or adherence to conventional values, possibly reflecting a structured lifestyle or formal education. Conversely, in its reversed position, it points to a desire for rebellion against outdated beliefs and the necessity to embrace personal freedom and alternative paths. The reading suggests a time for introspection regarding spiritual practices, relationships, and career dynamics, urging you to evaluate whether you are adhering to traditions that no longer serve you.", "arcana": "Mayor Arcana"}, {"name": "FIVE OF SWORDS", "sage": "The Five of Swords indicates a conflict or battle, often resulting in a sense of victory that may be short-lived. In the straight position, it suggests impending arguments with family or friends, driven by arrogance rather than compromise. In terms of love, tension and potential disputes are highlighted, while in a career context, workplace conflicts may arise. Financially, it advises caution in discussions about money.\n\nIn the reversed position, the card points towards a shift in perspective, emphasizing forgiveness over pride. In relationships, finding peace is crucial, whether through resolution or separation. Professionally, there may be positive changes, signaling an end to disputes, but it can also suggest a potential escalation of tensions. Financially, it encourages distancing from those who are overly focused on your finances, advocating for a more relaxed approach to money matters.", "arcana": "Minor Arcana"}, {"name": "JUSTICE", "sage": "The Tarot card Justice, represented by the Greek goddess Themis, symbolizes fairness, cause and effect, and the importance of integrity in decisions. In a reading focused on love, it emphasizes the karmic balance of giving and receiving love. For career insights, it advises making decisions based on fairness to ensure positive outcomes. In financial matters, it stresses maintaining honesty and balance to avoid negative consequences. When reversed, Justice indicates unfairness or a refusal to accept the repercussions of one's actions, prompting a need for introspection and moral behavior.", "arcana": "Mayor Arcana"}, {"name": "KNIGHT OF CUPS", "sage": "The \"Knight of Cups\" represents a blend of intuition, calmness, and emotional depth. In a reading, this card indicates a romantic and passionate relationship on the horizon, urging you to embrace creativity and your deeper feelings. In career contexts, it signifies a clear mind that aids in problem-solving and encourages creative pursuits. However, if reversed, the card warns of commitment issues, jealousy, and impulsiveness, suggesting a need for balance in both emotions and actions. In financial matters, reflection and thoughtful communication will support stability, while impulsive decisions may lead to setbacks.", "arcana": "Mayor Arcana"}, {"name": "KING OF WANDS", "sage": "The KING OF WANDS represents a strong, determined individual who sets goals and works diligently to achieve them. This card signifies the ability to find solutions and tackle challenges with enthusiasm, leadin
