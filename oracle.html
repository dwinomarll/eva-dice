// I Ching - 64 hexagrams
const HEXAGRAMS = [
  {n:1,ch:"乾",name:"The Creative",key:"Heaven · Force",desc:"Pure creative power and masculine energy. The dragon soars. The moment calls for bold initiative, strength of will, and righteous action. Your potential is limitless — but act with integrity."},
  {n:2,ch:"坤",name:"The Receptive",key:"Earth · Yielding",desc:"Receptive, nurturing, and yielding strength. Success comes not from pushing but from allowing. Be the soil that receives the seed. Patience, devotion, and quiet persistence lead to lasting achievement."},
  {n:3,ch:"屯",name:"Difficulty at the Beginning",key:"Birth Pains · Germination",desc:"New growth meets initial chaos. Like a seedling pushing through hard earth, this moment requires courage at the start. Don't give up — the struggle itself is shaping your foundation."},
  {n:4,ch:"蒙",name:"Youthful Folly",key:"Learning · Guidance",desc:"The student must seek the teacher — not the other way around. This is a time for humility and genuine learning. Question your assumptions. Find a guide. The young mind that admits ignorance becomes wise."},
  {n:5,ch:"需",name:"Waiting",key:"Patience · Right Timing",desc:"Clouds gather but rain has not yet fallen. The time is not yet right. Nourish yourself while you wait. Forcing the moment breaks it. True strength knows when to be still."},
  {n:6,ch:"訟",name:"Conflict",key:"Dispute · Caution",desc:"Opposition has arisen. Do not pursue conflict to its bitter end — seek mediation before it escalates. If you are right, partial victory is still victory. Don't let pride destroy what patience could preserve."},
  {n:7,ch:"師",name:"The Army",key:"Discipline · Leadership",desc:"Strength through order and unity. True leadership requires discipline — of yourself first. When others follow you, carry responsibility with integrity. A cause is only just if its means are also just."},
  {n:8,ch:"比",name:"Holding Together",key:"Union · Loyalty",desc:"Unity and mutual support. Alliances formed now can endure. Seek connection, offer loyalty, and receive it in return. Those who stand apart will struggle. Those who gather will flourish."},
  {n:9,ch:"小畜",name:"Small Taming",key:"Restraint · Accumulation",desc:"Small forces restrain larger ones — for now. Progress is possible but must be incremental. Accumulate strength and resources quietly. Do not force through obstacles. Gentle persistence is your tool."},
  {n:10,ch:"履",name:"Treading",key:"Careful Conduct · Tiger's Tail",desc:"You tread near the tiger's tail — danger is close but manageable through correct conduct. Be mindful of how you carry yourself. Confidence without arrogance, strength without aggression."},
  {n:11,ch:"泰",name:"Peace",key:"Harmony · Prosperity",desc:"Heaven and earth unite. Yin and yang in balance. This is a time of flourishing — embrace it fully. Relationships align, efforts bear fruit, and the path ahead opens. Peace earned through right action."},
  {n:12,ch:"否",name:"Standstill",key:"Stagnation · Obstruction",desc:"Heaven and earth are separated. Communication fails, progress stalls. This is not the time for bold moves. Retreat inward, preserve your strength, and wait for the blockage to clear naturally."},
  {n:13,ch:"同人",name:"Fellowship",key:"Community · Harmony",desc:"People of like mind come together. Great things are accomplished through union and shared purpose. Open your heart and your door. The fire that unites is stronger than the fire that divides."},
  {n:14,ch:"大有",name:"Great Possession",key:"Abundance · Success",desc:"The sun shines from the highest position — great resources and power are available to you. Use them with humility and generosity. Abundance shared multiplies; abundance hoarded withers."},
  {n:15,ch:"謙",name:"Modesty",key:"Humility · Grace",desc:"The mountain bows into the earth. True greatness knows how to be small. Modesty in success and in struggle alike is the quality that endures. The humble person rises because they never forgot the ground."},
  {n:16,ch:"豫",name:"Enthusiasm",key:"Joy · Readiness",desc:"Thunder emerges from earth — the time for bold action has arrived. Inspiration moves through you. Prepare joyfully and act decisively. Enthusiasm aligned with purpose creates unstoppable momentum."},
  {n:17,ch:"隨",name:"Following",key:"Adaptation · Flow",desc:"Go with what serves the moment. Rigid insistence on your original plan may miss a better path. Adapt to circumstances, follow what's truly good, and let the situation lead you to your destination."},
  {n:18,ch:"蠱",name:"Work on What Has Spoiled",key:"Repair · Restoration",desc:"Something has gone wrong and must be corrected. This is not punishment — it is the invitation to restoration. Face what has decayed with courage. Correction now prevents greater ruin later."},
  {n:19,ch:"臨",name:"Approach",key:"Advance · Drawing Near",desc:"Something great approaches — or you are called to approach something. The time for waiting has passed. Advance steadily and with good intent. Spring is coming; act as the season commands."},
  {n:20,ch:"觀",name:"Contemplation",key:"Perspective · Observation",desc:"Step back and observe. The wind over the earth surveys everything without judgment. A wider view reveals what close focus misses. Before acting, truly see. Understanding precedes right action."},
  {n:21,ch:"噬嗑",name:"Biting Through",key:"Justice · Decisiveness",desc:"An obstacle sits between the jaws — it must be bitten through. Justice is needed. Confront what blocks you directly and decisively. Half-measures will not work. Clarity and force of will clear the way."},
  {n:22,ch:"賁",name:"Grace",key:"Beauty · Adornment",desc:"Form and beauty serve substance. There is great power in aesthetic care — in how you present yourself and your work. But beauty is ornament, not foundation. Grace enhances truth; it does not replace it."},
  {n:23,ch:"剝",name:"Splitting Apart",key:"Deterioration · Letting Go",desc:"The roof is being stripped away. Erosion is happening. This is not the time to fight — it is time to let go of what has run its course. Conserve your energy. The turning point is near; preserve yourself for it."},
  {n:24,ch:"復",name:"Return",key:"Renewal · Turning Point",desc:"After the darkest moment, the first light of return. The solstice has passed. What was lost begins its journey back. Seeds stir beneath cold ground. Tend what is returning with gentleness and faith."},
  {n:25,ch:"無妄",name:"Innocence",key:"Integrity · Natural Action",desc:"Act without agenda, without artifice. What is done with pure intention aligns with the natural order and succeeds. Any action driven by calculation or deception courts disaster. Be genuinely yourself."},
  {n:26,ch:"大畜",name:"Great Taming",key:"Restraint · Accumulation",desc:"Great power is held in check — deliberately. This is the period of the great accumulation. The dam holds water not to waste it but to release it with tremendous force at the right moment."},
  {n:27,ch:"頤",name:"Nourishment",key:"Sustenance · Self-Care",desc:"What do you feed, and what feeds you? Examine both your outer nourishment (food, resources) and inner nourishment (thought, spirit). A body fed on junk and a mind fed on fear cannot sustain greatness."},
  {n:28,ch:"大過",name:"Preponderance of the Great",key:"Critical Point · Excess",desc:"The ridgepole bends under too much weight. A critical threshold has been reached. Something must change before it breaks. Extraordinary times require extraordinary measures — and extraordinary courage."},
  {n:29,ch:"坎",name:"The Abysmal",key:"Danger · Depth",desc:"Water flows through the abyss — not by avoiding it but by filling it completely and flowing through. Danger is real and present. Do not freeze. Move through the difficulty with steady persistence and trust."},
  {n:30,ch:"離",name:"The Clinging",key:"Clarity · Fire · Illumination",desc:"Fire must cling to something to burn. Clarity needs an object; love needs a home; vision needs a purpose. Attach yourself to what is truly good and luminous. Let your light illuminate, not consume."},
  {n:31,ch:"咸",name:"Influence",key:"Attraction · Courtship",desc:"Mutual influence flows between people like water between vessels. A genuine attraction — mental, spiritual, or romantic — is present. Do not force it. Allow the natural pull to guide connection."},
  {n:32,ch:"恆",name:"Duration",key:"Perseverance · Endurance",desc:"Thunder and wind — perpetual motion through consistent relationship. Endurance is not stubborn repetition but faithful consistency with what is true. The tree endures by being rooted and flexible."},
  {n:33,ch:"遯",name:"Retreat",key:"Strategic Withdrawal · Timing",desc:"The darkness advances; the wise withdraw. This is not defeat — it is strategy. Retreat to a better position. Preserve yourself, your values, and your resources. The time to return will come."},
  {n:34,ch:"大壯",name:"Great Power",key:"Strength · Momentum",desc:"Thunder in the sky — great power is available to you. But power without wisdom is destruction. Channel this surge with righteousness. The ram that charges blindly breaks its horns on the fence."},
  {n:35,ch:"晉",name:"Progress",key:"Advance · Promotion",desc:"The sun rises above the earth. Clear, steady progress in the right direction. Recognition comes to those who have been doing the right thing consistently. Your efforts are being seen."},
  {n:36,ch:"明夷",name:"Darkening of the Light",key:"Adversity · Inner Light",desc:"The sun descends below the earth — darkness surrounds the outer world. But the inner light cannot be extinguished. Conceal your brilliance if necessary. Survive with integrity. The light will rise again."},
  {n:37,ch:"家人",name:"The Family",key:"Order · Domestic Harmony",desc:"The household is the foundation of the world. Tend your inner circle with care. Clear roles, mutual respect, and genuine warmth create stability that radiates outward. Begin at home; change moves outward."},
  {n:38,ch:"睽",name:"Opposition",key:"Contrast · Reconciliation",desc:"Fire and water oppose each other — yet both serve life. Misunderstanding exists, but contrast does not require conflict. Seek what you share beneath the difference. Small matters can still succeed."},
  {n:39,ch:"蹇",name:"Obstruction",key:"Difficulty · Patience",desc:"The mountain blocks the path. Going forward is not the answer. Look back, look inward, seek help. Not every obstacle is meant to be overcome directly — sometimes the path goes around."},
  {n:40,ch:"解",name:"Deliverance",key:"Liberation · Release",desc:"The storm has passed. Tension releases. After struggle, relief. Move quickly to establish the new order before old patterns reassert themselves. Forgive what can be forgiven. Begin with a clean slate."},
  {n:41,ch:"損",name:"Decrease",key:"Reduction · Simplicity",desc:"Give more, want less — and paradoxically increase. Inner wealth grows when outer excess is stripped away. Sacrifice gladly what the situation requires. Sincerity and simplicity create abundance."},
  {n:42,ch:"益",name:"Increase",key:"Growth · Benefit",desc:"Wind and thunder together — growth accelerates. This is a time of genuine increase: wealth, skill, love, wisdom. Act boldly and generously. The good you give now multiplies and returns."},
  {n:43,ch:"夬",name:"Breakthrough",key:"Decisiveness · Resolution",desc:"The flood bursts through the dam. A decisive breakthrough is at hand. Speak the truth that must be said. Take the action that has been delayed. But do not act from anger — righteousness wins, not force."},
  {n:44,ch:"姤",name:"Coming to Meet",key:"Encounter · Temptation",desc:"A single dark line at the base of five light lines. Something or someone arrives that seems appealing but may undermine your strength. Be discerning. Not every encounter is an opportunity."},
  {n:45,ch:"萃",name:"Gathering Together",key:"Assembly · Unity",desc:"People and resources gather around a center. The time calls for consolidation and community. Bring together what belongs together. Shared purpose creates resilience. Offer generosity; receive loyalty."},
  {n:46,ch:"升",name:"Pushing Upward",key:"Rising · Ambition",desc:"The wood grows upward through the earth — steady, persistent, natural. This is a time of organic ascent. Advance step by step without forcing. Find good counsel and follow it. The summit approaches."},
  {n:47,ch:"困",name:"Oppression",key:"Exhaustion · Inner Strength",desc:"Resources are depleted; the situation is oppressive. Words cannot help now — only inner reserve. This is the test of character. Those who endure this moment with dignity emerge transformed and unbreakable."},
  {n:48,ch:"井",name:"The Well",key:"Source · Nourishment",desc:"The well is the inexhaustible source — it does not move yet nourishes all who draw from it. Tend your deepest resources: your values, your spirit, your core skills. The well must be maintained to sustain life."},
  {n:49,ch:"革",name:"Revolution",key:"Change · Transformation",desc:"The old order ends; a new one begins. Revolution is not chaos — it is necessary transformation when the old system no longer serves life. Act only when the time is truly right. Then be decisive."},
  {n:50,ch:"鼎",name:"The Cauldron",key:"Transformation · New Beginnings",desc:"The sacred cauldron transforms raw ingredients into nourishment. Refinement, culture, and elevation of the ordinary into something sacred. What you are working on is being transformed into something lasting."},
  {n:51,ch:"震",name:"The Arousing",key:"Thunder · Awakening",desc:"Thunder shocks and awakens. What seemed stable trembles. But after the shock, laughter — because the awakened one sees clearly. Fear is followed by relief and new perspective. Let the thunder teach you."},
  {n:52,ch:"艮",name:"Keeping Still",key:"Mountain · Meditation",desc:"The mountain does not move. Be still when stillness is needed. Meditation, boundaries, knowing when to stop. The back is turned to temptation. Hold your position. Stillness in the right moment is great power."},
  {n:53,ch:"漸",name:"Development",key:"Gradual Progress · Patience",desc:"The wild geese fly in formation — each step natural, each arrival at the right time. Do not rush the natural sequence. Gradual, steady development builds what is truly lasting. Trust the process."},
  {n:54,ch:"歸妹",name:"The Marrying Maiden",key:"Union · Transition",desc:"A significant transition or union is at hand — but it may not be on ideal terms. Navigate the situation with eyes open and expectations properly calibrated. Act with dignity within the constraints given."},
  {n:55,ch:"豐",name:"Abundance",key:"Fullness · Peak Moment",desc:"The sun at midday — maximum fullness. The peak of abundance and power is now. Celebrate this moment fully while being aware that peaks precede change. The wise leader shines most when most illuminated."},
  {n:56,ch:"旅",name:"The Wanderer",key:"Travel · Impermanence",desc:"The traveler moves through unfamiliar lands. Adaptability, lightness, and correct conduct matter more than roots right now. Do not overstay your welcome. Move with grace. Home is a state of inner peace."},
  {n:57,ch:"巽",name:"The Gentle",key:"Wind · Penetration",desc:"Wind penetrates everywhere through gentleness, not force. Gentle, persistent influence moves what direct attack cannot. Repeat your direction consistently and softly. The wind bends the oak over time."},
  {n:58,ch:"兌",name:"The Joyous",key:"Joy · Openness",desc:"The lake reflects the sky — open, accepting, joyous. True joy shared multiplies. Openness and warmth in communication create the atmosphere where good things grow. Find your genuine delight in this moment."},
  {n:59,ch:"渙",name:"Dispersion",key:"Dissolution · Spreading Out",desc:"The wind scatters what has hardened. Barriers dissolve; divisions heal. What was rigid becomes fluid again. This is the moment to let go of old resentments, old structures, and open to the larger flow."},
  {n:60,ch:"節",name:"Limitation",key:"Restraint · Moderation",desc:"Limits are not prisons — they are the banks that give the river its power and direction. Establish boundaries with clarity and keep them without bitterness. Not all limitation is negative; some is necessary."},
  {n:61,ch:"中孚",name:"Inner Truth",key:"Sincerity · Inner Confidence",desc:"The open space in the center — inner truth that radiates outward. What you hold as your deepest conviction has power. Sincerity moves even the most hardened hearts. Speak from your center; act from your center."},
  {n:62,ch:"小過",name:"Preponderance of the Small",key:"Small Steps · Attention to Detail",desc:"This is not the time for grand gestures. Small, careful actions are what succeed. The flying bird must not aim too high now. Attend to the near and the small. Humility and detail are your allies."},
  {n:63,ch:"既濟",name:"After Completion",key:"Achievement · Maintenance",desc:"The task is complete — but completion brings its own danger: complacency. Maintain what has been achieved with careful vigilance. The fire is hot, the water above. Things can still tip. Guard the flame."},
  {n:64,ch:"未濟",name:"Before Completion",key:"Transition · Almost There",desc:"The young fox almost crosses — but not quite yet. You are close to the goal but have not yet arrived. The final steps require the most care. Do not rush now. Completion approaches; approach it wisely."}
];

  document.getElementById('panel-' + tab).classList.add('active');

}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  document.getElementById('tarot-result').innerHTML = '';
}

function runTarotDraw() {
  if (currentSpread === 'celtic') drawCelticCross();
  else if (currentSpread === 'ppf') drawPastPresentFuture();
  else drawSingle();
}

function renderCard(card, position, delay) {
  const reversed = Math.random() < 0.35;
  const div = document.createElement('div');
  div.className = 'card-item';
  div.style.animationDelay = delay + 's';
  div.innerHTML = `
    <div class="card-pos">${position}</div>
    <div class="card-name">${card.name}</div>
    <span class="card-orient ${reversed ? 'reversed' : 'upright'}">${reversed ? '↓ Reversed' : '↑ Upright'}</span>
    <div class="card-sage">${card.sage || 'Meditate on the card and trust your intuition.'}</div>
  `;
  return div;
}

function drawCelticCross() {
  const deck = shuffle(TAROT_CARDS);
  const drawn = deck.slice(0, 10);
  const container = document.getElementById('tarot-result');
  container.innerHTML = '';
  drawn.forEach((card, i) => {
    container.appendChild(renderCard(card, CC_POSITIONS[i], i * 0.08));
  });
}

function drawPastPresentFuture() {
  const deck = shuffle(TAROT_CARDS);
  const positions = ['Past', 'Present', 'Future'];
  const container = document.getElementById('tarot-result');
  container.innerHTML = '';
  positions.forEach((pos, i) => {
    container.appendChild(renderCard(deck[i], pos, i * 0.12));
  });
}

function drawSingle() {
  const deck = shuffle(TAROT_CARDS);
  const container = document.getElementById('tarot-result');
  container.innerHTML = '';
  container.appendChild(renderCard(deck[0], 'Your Card', 0));
}

// ============================================================
// WILD MYSTIC
// ============================================================
function drawMystic() {
  const animals = WILD_MYSTICS.filter(a => a.name.trim() && a.name.trim() !== 'WILD MYSTIC');
  const animal = animals[Math.floor(Math.random() * animals.length)];
  const content = animal.content || animal.oracle || animal.mystical || '';
  
  // Split at shadow reading if present
  let main = content;
  let shadow = '';
  const shadowIdx = content.toUpperCase().indexOf('SHADOW READING');
  if (shadowIdx > -1) {
    main = content.slice(0, shadowIdx).trim();
    shadow = content.slice(shadowIdx + 14).replace(/^[:·\s]+/, '').trim();
  }

  // Extract keyword (often the first line is a keyword)
  const lines = main.split(/\n+/).filter(l => l.trim());
  let keyword = '';
  let bodyLines = lines;
  if (lines.length > 0 && lines[0].length < 40 && lines[0].toUpperCase() === lines[0]) {
    keyword = lines[0];
    bodyLines = lines.slice(1);
  }

  const container = document.getElementById('mystic-result');
  container.innerHTML = `
    <div class="mystic-card">
      <div class="mystic-name">${animal.name.trim()}</div>
      ${keyword ? `<div class="mystic-keyword">${keyword}</div>` : ''}
      <div class="mystic-desc">${bodyLines.join(' ')}</div>
      ${shadow ? `<div class="shadow-label">✦ Shadow Reading</div><div class="mystic-desc">${shadow}</div>` : ''}
    </div>
  `;
}

// ============================================================
// I CHING - THREE COIN METHOD
// ============================================================
function castIChing() {
  // Each line: throw 3 coins (heads=3, tails=2)
  // 6=old yin(changing), 7=young yang, 8=young yin, 9=old yang(changing)
  const lines = [];
  for (let i = 0; i < 6; i++) {
    const coins = [1,2,3].map(() => Math.random() < 0.5 ? 3 : 2);
    const val = coins.reduce((a, b) => a + b, 0);
    lines.push(val); // 6,7,8,9
  }
  
  // Build primary hexagram (bottom to top)
  // 6=yin, 7=yang, 8=yin, 9=yang
  const isYang = v => v === 7 || v === 9;
  const isChanging = v => v === 6 || v === 9;
  
  // Convert 6 lines to hexagram number (binary: yang=1, yin=0)
  // King Wen order uses a lookup table
  const toBinary = (lines) => {
    return lines.map(v => isYang(v) ? 1 : 0);
  };
  
  const binToHexNum = (bits) => {
    // bits[0]=bottom line, bits[5]=top line
    // Upper trigram = bits[3,4,5], lower = bits[0,1,2]
    const lower = bits[0]*4 + bits[1]*2 + bits[2]*1;
    const upper = bits[3]*4 + bits[4]*2 + bits[5]*1;
    return KING_WEN[upper][lower];
  };
  
  const KING_WEN = [
  // lower: 0   1   2   3   4   5   6   7
           [2,  23, 8,  20, 16, 35, 45, 12], // upper 0 (坤)
           [15, 52, 39, 53, 62, 56, 31, 33], // upper 1 (艮)
           [7,  4,  29, 59, 40, 64, 47, 6],  // upper 2 (坎)
           [46, 18, 48, 57, 32, 50, 28, 44], // upper 3 (巽)
           [24, 27, 3,  42, 51, 21, 17, 25], // upper 4 (震)
           [36, 22, 63, 37, 55, 30, 49, 13], // upper 5 (離)
           [19, 41, 60, 61, 54, 38, 58, 10], // upper 6 (兌)
           [11, 26, 5,  9,  34, 14, 43, 1],  // upper 7 (乾)
  ];
  
  const primaryBits = toBinary(lines);
  const primaryNum = binToHexNum(primaryBits);
  const primaryHex = HEXAGRAMS.find(h => h.n === primaryNum) || HEXAGRAMS[0];
  
  // Changing lines
  const changingLines = lines.map((v, i) => isChanging(v) ? i : -1).filter(i => i >= 0);
  
  // Future hexagram (flip changing lines)
  let futureHex = null;
  if (changingLines.length > 0) {
    const futureBits = [...primaryBits];
    changingLines.forEach(i => { futureBits[i] = 1 - futureBits[i]; });
    const futureNum = binToHexNum(futureBits);
    futureHex = HEXAGRAMS.find(h => h.n === futureNum) || HEXAGRAMS[0];
  }
  
  // Render
  const container = document.getElementById('iching-result');
  
  const lineHTML = lines.map((v, i) => {
    const yang = isYang(v);
    const changing = isChanging(v);
    let cls = yang ? 'yang' : 'yin';
    if (changing) cls = 'changing-' + cls;
    const changeMark = changing ? ' <span style="font-size:0.65rem;color:var(--gold-dim);letter-spacing:0.1em">changing</span>' : '';
    return `<div style="display:flex;align-items:center;gap:0.5rem;">
      <span style="font-size:0.6rem;color:var(--text-dim);width:1.5rem;text-align:right">${i+1}</span>
      <div class="hex-line ${cls}"></div>
      ${changeMark}
    </div>`;
  }).reverse().join(''); // top to bottom display
  
  let futureHTML = '';
  if (futureHex) {
    const futureBits = [...primaryBits];
    changingLines.forEach(i => { futureBits[i] = 1 - futureBits[i]; });
    const futureLineHTML = futureBits.map((b, i) => {
      const cls = b ? 'yang' : 'yin';
      return `<div style="display:flex;align-items:center;gap:0.5rem;">
        <span style="font-size:0.6rem;color:var(--text-dim);width:1.5rem;text-align:right">${i+1}</span>
        <div class="hex-line ${cls}"></div>
      </div>`;
    }).reverse().join('');
    futureHTML = `
      <div class="future-hex hex-desc">
        <div class="future-label">✦ Transforms Into</div>
        <div class="hexagram-display">
          <div class="hex-lines">${futureLineHTML}</div>
          <div class="hex-chinese">${futureHex.ch}</div>
          <div class="hex-number">Hexagram ${futureHex.n}</div>
          <div class="hex-name">${futureHex.name}</div>
          <div class="hex-keyword">${futureHex.key}</div>
          <div class="mystic-desc" style="text-align:left;margin-top:0.5rem">${futureHex.desc}</div>
        </div>
      </div>
    `;
  }
  
  const changingNote = changingLines.length > 0 
    ? `<div class="changing-note">Lines ${changingLines.map(i=>i+1).join(', ')} are changing · moving toward transformation</div>`
    : '<div class="changing-note">No changing lines · a stable moment</div>';
  
  container.innerHTML = `
    <div class="hexagram-display">
      <div class="hex-lines">${lineHTML}</div>
      <div class="hex-chinese">${primaryHex.ch}</div>
      <div class="hex-number">Hexagram ${primaryHex.n}</div>
      <div class="hex-name">${primaryHex.name}</div>
      <div class="hex-keyword">${primaryHex.key}</div>
      ${changingNote}
    </div>
    <div class="hex-desc">${primaryHex.desc}</div>
    ${futureHTML}
  `;
}

// ============================================================
// DICE
// ============================================================
const DICE_MODES = [4, 6, 8, 10, 12, 20, 100];
const DICE_EMOJI = {4:'🔺',6:'⬛',8:'🔷',10:'🔟',12:'🔸',20:'⚡',100:'💯'};
let currentMode = 20;
let diceCount = 1;

function initDice() {
  const modeRow = document.getElementById('mode-row');
  DICE_MODES.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (d === 20 ? ' active' : '');
    btn.textContent = 'D' + d;
    btn.onclick = () => {
      currentMode = d;
      modeRow.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('dice-result').textContent = '—';
      document.getElementById('multi-results').innerHTML = '';
      document.getElementById('dice-label').textContent = 'tap to roll';
    };
    modeRow.appendChild(btn);
  });
  
  const countRow = document.getElementById('count-row');
  [1,2,3,4,5].forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'mode-btn' + (n === 1 ? ' active' : '');
    btn.textContent = n + (n===1?' die':' dice');
    btn.onclick = () => {
      diceCount = n;
      countRow.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('dice-result').textContent = '—';
      document.getElementById('multi-results').innerHTML = '';
      document.getElementById('dice-label').textContent = 'tap to roll';
    };
    countRow.appendChild(btn);
  });
}

function rollDice() {
  const visual = document.getElementById('dice-visual');
  const resultEl = document.getElementById('dice-result');
  const labelEl = document.getElementById('dice-label');
  const multiEl = document.getElementById('multi-results');
  
  visual.classList.remove('rolling');
  void visual.offsetWidth;
  visual.classList.add('rolling');
  
  const rolls = [];
  for (let i = 0; i < diceCount; i++) {
    rolls.push(Math.floor(Math.random() * currentMode) + 1);
  }
  const total = rolls.reduce((a, b) => a + b, 0);
  
  if (diceCount === 1) {
    resultEl.textContent = rolls[0];
    labelEl.textContent = 'D' + currentMode;
    multiEl.innerHTML = '';
  } else {
    resultEl.textContent = total;
    labelEl.textContent = `${diceCount}D${currentMode} · total`;
    multiEl.innerHTML = rolls.map((r, i) => `
      <div class="multi-die" style="animation-delay:${i*0.06}s">
        <div class="num">${r}</div>
        <div class="die-label">D${currentMode}</div>
      </div>
    `).join('');
  }
}

initDice();
