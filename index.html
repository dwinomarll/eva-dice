<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVA D20 Roller</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07070f;
      color: #fff;
      font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    #title {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(212, 175, 55, 0.45);
      margin-bottom: 0.5rem;
    }

    #canvas-wrap {
      width: 100%;
      max-width: 600px;
      height: 56vh;
      position: relative;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    #result-area {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      margin: 0.25rem 0 0.75rem;
    }

    .roll-num {
      font-size: 3.8rem;
      font-weight: 800;
      color: #d4af37;
      text-shadow: 0 0 24px rgba(212, 175, 55, 0.6), 0 0 60px rgba(212, 175, 55, 0.25);
      animation: popIn 0.35s cubic-bezier(0.22, 1.8, 0.5, 1) both;
      line-height: 1;
    }

    .roll-sep {
      font-size: 2rem;
      color: rgba(255, 255, 255, 0.18);
      font-weight: 300;
    }

    .roll-total {
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: rgba(212, 175, 55, 0.55);
      text-transform: uppercase;
      animation: fadeUp 0.4s 0.2s ease-out both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.3) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #mode-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }

    .mode-btn {
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: rgba(212, 175, 55, 0.55);
      padding: 0.35rem 1.25rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      transition: all 0.2s;
    }

    .mode-btn:hover {
      border-color: rgba(212, 175, 55, 0.6);
      color: rgba(212, 175, 55, 0.85);
    }

    .mode-btn.active {
      background: rgba(212, 175, 55, 0.18);
      border-color: #d4af37;
      color: #d4af37;
    }

    #roll-btn {
      background: linear-gradient(135deg,
        rgba(212, 175, 55, 0.22) 0%,
        rgba(130, 80, 200, 0.22) 100%);
      border: 1px solid rgba(212, 175, 55, 0.7);
      color: #d4af37;
      padding: 0.7rem 3rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    #roll-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(212, 175, 55, 0.08);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #roll-btn:hover::after { opacity: 1; }
    #roll-btn:active { transform: scale(0.97); }

    #roll-btn.rolling {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="title">EVA · Dice Roller</div>
  <div id="canvas-wrap"></div>
  <div id="result-area"></div>
  <div id="mode-row">
    <button class="mode-btn active" id="btn-single" onclick="setMode(1)">Single D20</button>
    <button class="mode-btn" id="btn-double" onclick="setMode(2)">Double D20</button>
  </div>
  <button id="roll-btn" onclick="rollDice()">Roll</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    /* ───────── Scene ───────── */
    const wrap = document.getElementById('canvas-wrap');
    const W    = () => wrap.clientWidth;
    const H    = () => wrap.clientHeight;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W(), H());
    wrap.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, W() / H(), 0.1, 100);
    camera.position.set(0, 0, 7.5);

    /* lights */
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const gold = new THREE.PointLight(0xd4af37, 4, 22);
    gold.position.set(5, 5, 5);
    scene.add(gold);

    const purple = new THREE.PointLight(0x8250cc, 2.5, 20);
    purple.position.set(-5, -3, 3);
    scene.add(purple);

    const rim = new THREE.PointLight(0x4499ff, 1.5, 18);
    rim.position.set(0, -6, -3);
    scene.add(rim);

    /* ───────── Face texture builder ───────── */
    // UV layout: each face uses equilateral triangle UVs
    //   v0 = (0.5, 0.95)  → top
    //   v1 = (0.05, 0.05) → bottom-left
    //   v2 = (0.95, 0.05) → bottom-right
    // Canvas centroid (accounting for UV-to-canvas Y flip):
    //   cx = 0.5  →  128 / 256
    //   cy = (1 - (0.95+0.05+0.05)/3) = 1 - 0.35 = 0.65  →  ~166 / 256

    function makeFaceTexture(num) {
      const S   = 256;
      const cvs = document.createElement('canvas');
      cvs.width  = S;
      cvs.height = S;
      const ctx  = cvs.getContext('2d');

      /* dark background */
      ctx.fillStyle = '#0d0d22';
      ctx.fillRect(0, 0, S, S);

      /* subtle triangle outline — canvas y = (1-uv.y)*S */
      const tx = [S*0.5, S*0.05, S*0.95];
      const ty = [(1-0.95)*S, (1-0.05)*S, (1-0.05)*S];
      ctx.beginPath();
      ctx.moveTo(tx[0], ty[0]);
      ctx.lineTo(tx[1], ty[1]);
      ctx.lineTo(tx[2], ty[2]);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(212,175,55,0.3)';
      ctx.lineWidth   = 3;
      ctx.stroke();

      /* number — drawn at centroid */
      const cx = S * 0.5;
      const cy = S * 0.65;
      const fs = num >= 10 ? 88 : 100;

      ctx.save();
      ctx.shadowColor = 'rgba(212,175,55,0.7)';
      ctx.shadowBlur  = 18;
      ctx.fillStyle   = '#d4af37';
      ctx.font        = `bold ${fs}px Arial, sans-serif`;
      ctx.textAlign   = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(num), cx, cy);
      ctx.restore();

      return new THREE.CanvasTexture(cvs);
    }

    /* ───────── Die factory ───────── */
    // Standard D20 opposite-faces sum to 21 ordering (approximated)
    const D20_ORDER = [20,2,6,15,12,5,17,10,1,19,14,8,3,18,16,7,13,4,11,9];

    function makeDie(xPos, dieRadius) {
      /* base geo for edges — stays indexed */
      const baseGeo = new THREE.IcosahedronGeometry(dieRadius, 0);

      /* non-indexed clone for per-face UV + material groups */
      const geo = baseGeo.toNonIndexed();

      /* override UVs: every face gets the same equilateral triangle layout */
      const uvArr = new Float32Array(20 * 3 * 2);
      for (let i = 0; i < 20; i++) {
        const b = i * 6;
        uvArr[b+0]=0.5;  uvArr[b+1]=0.95; // v0 top
        uvArr[b+2]=0.05; uvArr[b+3]=0.05; // v1 bottom-left
        uvArr[b+4]=0.95; uvArr[b+5]=0.05; // v2 bottom-right
      }
      geo.setAttribute('uv', new THREE.BufferAttribute(uvArr, 2));

      /* one material group per face */
      geo.clearGroups();
      for (let i = 0; i < 20; i++) geo.addGroup(i * 3, 3, i);

      /* 20 materials — one canvas texture per face number */
      const materials = D20_ORDER.map(num =>
        new THREE.MeshStandardMaterial({
          map:              makeFaceTexture(num),
          metalness:        0.75,
          roughness:        0.28,
          emissive:         new THREE.Color(0x0a0818),
          emissiveIntensity: 0.35,
        })
      );

      /* edge lines use the original indexed geometry */
      const edgeMat  = new THREE.LineBasicMaterial({ color: 0xd4af37 });
      const edgeLines = new THREE.LineSegments(new THREE.EdgesGeometry(baseGeo), edgeMat);

      const group = new THREE.Group();
      group.add(new THREE.Mesh(geo, materials));
      group.add(edgeLines);
      group.position.x = xPos;
      group.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );
      scene.add(group);

      return {
        group,
        spinning:  false,
        result:    null,
        startTime: 0,
        duration:  0,
        axis:      new THREE.Vector3(),
      };
    }

    /* ───────── Dice state ───────── */
    let mode    = 1;
    let rolling = false;
    let diceArr = [];

    function buildDice() {
      diceArr.forEach(d => scene.remove(d.group));
      diceArr = [];
      if (mode === 1) {
        diceArr.push(makeDie(0, 1.8));
      } else {
        diceArr.push(makeDie(-2.1, 1.55));
        diceArr.push(makeDie( 2.1, 1.55));
      }
    }

    buildDice();

    /* ───────── Roll ───────── */
    function rollDice() {
      if (rolling) return;
      rolling = true;
      document.getElementById('roll-btn').classList.add('rolling');
      document.getElementById('result-area').innerHTML = '';

      const now = performance.now();
      diceArr.forEach(d => {
        d.result    = Math.floor(Math.random() * 20) + 1;
        d.spinning  = true;
        d.startTime = now;
        d.duration  = 1700 + Math.random() * 600;
        d.axis.set(
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2
        ).normalize();
      });
    }

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    /* ───────── Results ───────── */
    function showResults() {
      const area = document.getElementById('result-area');
      const nums = diceArr.map(d => d.result);

      if (nums.length === 1) {
        area.innerHTML = `<span class="roll-num">${nums[0]}</span>`;
      } else {
        const total = nums.reduce((a, b) => a + b, 0);
        area.innerHTML =
          `<span class="roll-num">${nums[0]}</span>` +
          `<span class="roll-sep">+</span>` +
          `<span class="roll-num">${nums[1]}</span>` +
          `<span class="roll-total" style="align-self:flex-end;margin-bottom:0.6rem">= ${total}</span>`;
      }
    }

    /* ───────── Render loop ───────── */
    function animate(now) {
      requestAnimationFrame(animate);

      let anySpinning = false;

      diceArr.forEach(d => {
        if (d.spinning) {
          const t     = Math.min((now - d.startTime) / d.duration, 1);
          const speed = (1 - easeOut(t)) * 0.22;

          d.group.rotateOnAxis(d.axis, speed);
          d.group.rotation.x += speed * 0.38;
          d.group.rotation.z += speed * 0.14;

          if (t >= 1) d.spinning = false;
          else        anySpinning = true;
        } else if (!rolling) {
          d.group.rotation.y += 0.0035;
          d.group.rotation.x += 0.0012;
        }
      });

      if (rolling && !anySpinning) {
        rolling = false;
        document.getElementById('roll-btn').classList.remove('rolling');
        showResults();
      }

      renderer.render(scene, camera);
    }

    animate(performance.now());

    /* ───────── Mode toggle ───────── */
    function setMode(m) {
      if (rolling) return;
      mode = m;
      document.getElementById('btn-single').classList.toggle('active', m === 1);
      document.getElementById('btn-double').classList.toggle('active', m === 2);
      document.getElementById('result-area').innerHTML = '';
      buildDice();
    }

    /* ───────── Resize ───────── */
    window.addEventListener('resize', () => {
      camera.aspect = W() / H();
      camera.updateProjectionMatrix();
      renderer.setSize(W(), H());
    });
  </script>
</body>
</html>
